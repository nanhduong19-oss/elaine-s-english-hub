<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital PET Reading Answer Sheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #dc2626; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .bubble-label input:checked + div {
            background-color: #1f2937;
            border-color: #1f2937;
            color: white;
        }
    </style>
</head>
<body class="text-gray-800 p-4 md:p-8 flex justify-center">

    <div class="max-w-4xl w-full bg-white rounded-xl shadow-lg overflow-hidden">
        
        <div class="bg-red-600 text-white p-6 flex flex-col md:flex-row items-center md:items-end justify-between gap-4">
            <div class="flex items-center gap-4">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQrKh1FPsEML9CMKsln1FwcIlF1BcnOioHT6Q&s" alt="Logo" class="h-14 w-14 bg-white rounded-full p-1 object-contain">
                <div>
                    <h1 class="text-xl md:text-2xl font-bold tracking-wide">PET READING - DIGITAL ANSWER SHEET</h1>
                    <p class="text-red-100 text-sm">Ruby School Evaluation System</p>
                </div>
            </div>
        </div>

        <form id="examForm" class="p-6 md:p-8 space-y-8">
            
            <div class="bg-gray-50 p-6 rounded-lg border border-gray-200 shadow-sm">
                <h2 class="text-lg font-bold text-gray-800 border-b pb-2 mb-4">1. Student Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Student ID (Mã HS) <span class="text-red-500">*</span></label>
                        <div class="flex gap-2">
                            <input type="text" id="studentId" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-red-500 outline-none uppercase" placeholder="VD: 71001BT">
                            <button type="button" id="btnCheckId" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded font-medium transition flex items-center justify-center gap-2">
                                <span id="btnText">Check</span>
                                <div class="spinner" id="loadingSpinner"></div>
                            </button>
                        </div>
                        <p id="idMessage" class="text-xs mt-1 text-red-500 hidden"></p>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                        <input type="text" id="studentName" readonly class="w-full px-3 py-2 border border-gray-200 bg-gray-100 text-gray-500 rounded font-medium cursor-not-allowed" placeholder="Auto-filled">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Class</label>
                        <input type="text" id="studentClass" readonly class="w-full px-3 py-2 border border-gray-200 bg-gray-100 text-gray-500 rounded font-medium cursor-not-allowed" placeholder="Auto-filled">
                    </div>
                </div>
            </div>

            <div>
                <h2 class="text-lg font-bold text-gray-800 border-b pb-2 mb-4">2. Test Selection</h2>
                <select id="testSelection" required class="w-full md:w-1/2 px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-red-500 outline-none bg-white font-medium text-gray-700">
                    <option value="">-- Please select a test --</option>
                    <option value="TEST_31">PET Reading - Test 31</option>
                    <option value="TEST_32">PET Reading - Test 32</option>
                    <option value="TEST_33">PET Reading - Test 33</option>
                    <option value="TEST_34">PET Reading - Test 34</option>
                    <option value="TEST_35">PET Reading - Test 35</option>
                    <option value="TEST_36">PET Reading - Test 36</option>
                    <option value="TEST_37">PET Reading - Test 37</option>
                    <option value="TEST_38">PET Reading - Test 38</option>
                    <option value="TEST_39">PET Reading - Test 39</option>
                    <option value="TEST_40">PET Reading - Test 40</option>
                    <option value="TEST_41">PET Reading - Test 41</option>
                    <option value="TEST_42">PET Reading - Test 42</option>
                    <option value="TEST_43">PET Reading - Test 43</option>
                    <option value="TEST_44">PET Reading - Test 44</option>
                    <option value="TEST_45">PET Reading - Test 45</option>
                </select>
            </div>

            <div>
                <h2 class="text-lg font-bold text-gray-800 border-b pb-2 mb-4">3. Answer Area (32 Questions)</h2>
                <div id="questionsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    </div>
            </div>

            <div class="pt-4 border-t border-gray-200">
                <button type="submit" id="btnSubmit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold text-lg py-4 rounded-lg shadow-lg transition flex items-center justify-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span id="submitText">SUBMIT ALL 32 ANSWERS</span>
                    <div class="spinner" id="submitSpinner" style="border-top-color: white;"></div>
                </button>
            </div>
            
        </form>
    </div>

    <script>
        // CẤU TRÚC 32 CÂU HỎI
        const partsConfig = [
            { title: "Part 1", start: 1, end: 5, type: 'mcq', options: ['A','B','C'] },
            { title: "Part 2", start: 6, end: 10, type: 'mcq', options: ['A','B','C','D','E','F','G','H'] },
            { title: "Part 3", start: 11, end: 15, type: 'mcq', options: ['A','B','C','D'] },
            { title: "Part 4", start: 16, end: 20, type: 'mcq', options: ['A','B','C','D','E','F','G','H'] },
            { title: "Part 5", start: 21, end: 26, type: 'mcq', options: ['A','B','C','D'] },
            { title: "Part 6", start: 27, end: 32, type: 'text' }
        ];

        const container = document.getElementById('questionsContainer');

        partsConfig.forEach(part => {
            let partHTML = `<div class="border border-gray-300 rounded-lg overflow-hidden bg-white shadow-sm">
                                <div class="bg-gray-200 font-bold text-gray-800 px-4 py-2 border-b border-gray-300">${part.title}</div>
                                <div class="p-4 space-y-3">`;
            
            for (let i = part.start; i <= part.end; i++) {
                partHTML += `<div class="flex items-center gap-4 border-b border-dashed border-gray-200 pb-2 last:border-0 last:pb-0">
                                <div class="font-bold text-gray-700 w-6 text-right">${i}.</div>`;
                
                if (part.type === 'mcq') {
                    partHTML += `<div class="flex flex-wrap gap-2">`;
                    part.options.forEach(opt => {
                        partHTML += `
                            <label class="bubble-label cursor-pointer relative">
                                <input type="radio" name="q${i}" value="${opt}" class="sr-only peer">
                                <div class="w-8 h-8 rounded-full border-2 border-gray-400 flex items-center justify-center font-bold text-gray-500 peer-checked:bg-gray-800 peer-checked:text-white peer-checked:border-gray-800 transition-colors">
                                    ${opt}
                                </div>
                            </label>
                        `;
                    });
                    partHTML += `</div>`;
                } else if (part.type === 'text') {
                    partHTML += `<input type="text" id="q${i}" class="flex-grow uppercase border border-gray-400 rounded px-3 py-1.5 focus:ring-2 focus:ring-red-500 outline-none font-bold" placeholder="Write answer...">`;
                }
                
                partHTML += `</div>`;
            }
            partHTML += `</div></div>`;
            container.innerHTML += partHTML;
        });

        // LINK APPS SCRIPT ĐÃ CẬP NHẬT
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwbg1XGRwSoQOLT0hIV_RYNIn60IpMXIlWcVnNpAnKSncux5tuaWKt10o2sPj2uleWPBA/exec";

        document.getElementById('btnCheckId').addEventListener('click', async () => {
            const idInput = document.getElementById('studentId').value.trim();
            const msgEl = document.getElementById('idMessage');
            if(!idInput) {
                msgEl.textContent = "Vui lòng nhập mã HS!"; msgEl.classList.remove('hidden'); return;
            }

            document.getElementById('btnText').style.display = 'none';
            document.getElementById('loadingSpinner').style.display = 'block';
            msgEl.classList.add('hidden');

            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?id=${idInput}`);
                const data = await response.json();

                if(data.status === "success") {
                    document.getElementById('studentName').value = data.name;
                    document.getElementById('studentClass').value = data.className;
                    msgEl.textContent = "Tìm thấy học sinh!";
                    msgEl.className = "text-xs mt-1 text-green-600 font-bold block";
                } else {
                    document.getElementById('studentName').value = "";
                    document.getElementById('studentClass').value = "";
                    msgEl.textContent = "Không tìm thấy mã HS này!";
                    msgEl.className = "text-xs mt-1 text-red-500 block";
                }
            } catch(e) {
                msgEl.textContent = "Lỗi kết nối máy chủ!"; msgEl.className = "text-xs mt-1 text-red-500 block";
            } finally {
                document.getElementById('btnText').style.display = 'block';
                document.getElementById('loadingSpinner').style.display = 'none';
            }
        });

        document.getElementById('examForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            if(!document.getElementById('studentName').value) {
                alert("Vui lòng ấn nút 'Check' để xác nhận đúng mã Học sinh trước khi nộp bài!");
                return;
            }

            const answersData = {};
            for (let i = 1; i <= 32; i++) {
                if (i >= 27 && i <= 32) {
                    answersData['q' + i] = document.getElementById('q' + i).value.trim().toUpperCase();
                } else {
                    const selected = document.querySelector(`input[name="q${i}"]:checked`);
                    answersData['q' + i] = selected ? selected.value : "";
                }
            }

            const payload = {
                studentId: document.getElementById('studentId').value,
                studentName: document.getElementById('studentName').value,
                testSelection: document.getElementById('testSelection').value,
                answers: answersData
            };

            const btnSubmit = document.getElementById('btnSubmit');
            document.getElementById('submitText').textContent = "UPLOADING...";
            document.getElementById('submitSpinner').style.display = 'block';
            btnSubmit.disabled = true;

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                if(result.status === "success") {
                    alert(result.message);
                    document.getElementById('examForm').reset();
                    document.querySelectorAll('input[type="radio"]').forEach(radio => radio.checked = false);
                } else {
                    alert("Có lỗi xảy ra: " + result.message);
                }
            } catch(error) {
                alert("Bài làm đã được gửi đi thành công!"); 
                document.getElementById('examForm').reset();
            } finally {
                document.getElementById('submitText').textContent = "SUBMIT ALL 32 ANSWERS";
                document.getElementById('submitSpinner').style.display = 'none';
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
