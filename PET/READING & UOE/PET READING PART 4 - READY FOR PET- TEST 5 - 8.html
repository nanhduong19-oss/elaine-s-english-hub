<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET Reading Part 4 - Drag & Drop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* --- DRAG & DROP STYLES --- */
        
        /* 1. Base Drop Zone (Empty - Rose Theme for PET) */
        .drop-zone {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: auto;
            min-width: 45px;
            height: 28px;
            margin: 0 4px;
            background-color: #fff1f2; /* Rose-50 */
            border: 2px dashed #fda4af; /* Rose-300 */
            border-radius: 6px;
            transition: all 0.2s ease;
            color: #be123c; /* Rose-700 */
            font-weight: 700;
            font-size: 0.85em;
            padding: 0 6px;
            vertical-align: middle;
            cursor: pointer;
        }

        .drop-zone.hovered {
            background-color: #fce7f3;
            border-color: #db2777;
            transform: scale(1.1);
        }

        /* 2. FILLED STATE (Bình thường: Đen, Đậm, Không nền, Không viền) */
        .drop-zone.filled {
            display: inline; 
            width: auto;
            height: auto;
            margin: 0 2px;
            padding: 2px 6px;
            
            /* Visuals: Transparent & No Border */
            background-color: transparent !important; 
            border: none !important; 
            border-radius: 4px;
            border-bottom: 2px solid transparent !important; /* Để dành cho hover */
            
            /* Typography: Black Text by default */
            color: #000000 !important; 
            font-size: 1em;
            font-weight: 800; /* In đậm */
            line-height: 1.6;
            text-align: left;
            box-shadow: none !important;
            white-space: normal;
        }
        
        /* Hover vào câu đã điền: Hiện gạch chân hồng */
        .drop-zone.filled:hover {
            border-bottom: 2px solid #be123c !important; 
            background-color: #fff1f2 !important; /* Feedback nhẹ khi hover */
        }
        
        .drop-zone.filled:hover::after {
            content: ' ✕';
            font-size: 0.8em;
            color: #ef4444;
            margin-left: 5px;
        }

        /* 3. CORRECT STATE (Đúng: Chữ Xanh đậm, Nền Xanh nhạt, Tích) */
        .drop-zone.filled.correct {
            background-color: #dcfce7 !important; /* Light Green Bg */
            color: #15803d !important; /* Dark Green Text */
            border: 1px solid #86efac !important;
            border-bottom: 1px solid #86efac !important;
            padding-right: 28px !important; /* Chừa chỗ cho icon */
            position: relative;
            pointer-events: none; /* Khóa */
        }

        .drop-zone.filled.correct::after {
            content: '\f00c'; /* FontAwesome Check Icon */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8em;
            color: #15803d;
            margin-left: 0;
        }

        /* 4. WRONG STATE (Sai: Chữ Đỏ đậm, Nền Đỏ nhạt, X) */
        .drop-zone.filled.wrong {
            background-color: #fee2e2 !important; /* Light Red Bg */
            color: #b91c1c !important; /* Dark Red Text */
            border: 1px solid #fca5a5 !important;
            border-bottom: 1px solid #fca5a5 !important;
            padding-right: 28px !important; /* Chừa chỗ cho icon */
            position: relative;
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        .drop-zone.filled.wrong::after {
            content: '\f00d'; /* FontAwesome X Icon */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8em;
            color: #b91c1c;
            margin-left: 0;
        }

        .draggable-item { cursor: grab; user-select: none; touch-action: none; }
        .draggable-item:active { cursor: grabbing; }
        .draggable-item.dragging { opacity: 0.5; transform: scale(0.95); }
        .draggable-item.used {
            opacity: 0.4;
            pointer-events: none;
            background-color: #f1f5f9;
            filter: grayscale(100%);
            border-style: dashed;
            color: #94a3b8;
        }

        .reading-content p { margin-bottom: 1.5em; line-height: 2.2; text-align: justify; }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        #questions-container { overflow-anchor: none !important; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col text-slate-800 overflow-hidden">

    <div id="screen-welcome" class="fixed inset-0 z-50 bg-slate-50 flex items-center justify-center p-4">

            <div class="p-8 text-center">
                <h1 class="text-3xl font-extrabold text-slate-800 mb-2">PET Reading Part 4</h1>
                <p class="text-slate-500 mb-6 font-medium">Ready for PET - Tests 5-8</p>
                <div class="inline-block bg-rose-100 text-rose-700 px-4 py-1 rounded-full text-xs font-bold tracking-wider mb-8">
                    DRAG & DROP MODE
                </div>

                        class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-rose-500 outline-none transition-all font-medium">

    <!-- SCREEN 2: MAIN APP -->
    <div id="screen-app" class="hidden flex-col h-full">
        <!-- Header -->
        <header class="bg-white border-b border-slate-200 h-16 flex-none z-20">
            <div class="h-full max-w-[1920px] mx-auto px-6 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="px-3 py-1 bg-rose-50 border border-rose-200 rounded-lg text-rose-700 font-mono font-bold text-sm flex items-center gap-2">
                        <i class="far fa-clock"></i> <span id="timer-display">00:00:00</span>
                    </div>

                </div>
                <div class="flex items-center gap-4">
                     <div class="text-right hidden md:block">
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Candidate</p>

                    </div>

        <!-- Main Content -->

                <div class="w-full lg:w-[65%] h-1/2 lg:h-full bg-white border-r border-slate-200 overflow-y-auto custom-scrollbar p-6 lg:p-10 relative">
                    <div class="max-w-4xl mx-auto pb-20">
                        <h3 class="font-bold text-slate-400 text-xs uppercase tracking-wider mb-2">Reading Article</h3>

                        <div id="explanation-box" class="hidden mt-8 p-6 bg-rose-50 rounded-xl border border-rose-200">
                            <h4 class="font-bold text-rose-800 mb-4 flex items-center gap-2"><i class="fas fa-lightbulb"></i> Explanations</h4>
                            <div id="explanation-content" class="space-y-3 text-sm text-rose-900"></div>

                <!-- Options Area -->
                <div class="w-full lg:w-[35%] h-1/2 lg:h-full bg-slate-50 flex flex-col border-t lg:border-t-0 border-slate-200 shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)] z-10">

                        </h3>

                        </div>

                </div>

    <!-- SCREEN 3: RESULT -->
    <div id="screen-result" class="hidden fixed inset-0 z-50 bg-slate-50 overflow-y-auto custom-scrollbar">
        <div class="min-h-screen w-full flex items-start justify-center p-6 md:py-12">
            <div class="max-w-2xl w-full flex flex-col gap-6">

                    </div>
                    <div id="result-percent" class="text-slate-500 font-medium mb-6">0%</div>
                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-100 flex justify-between text-sm font-bold text-slate-600">
                         <span>Candidate: <span id="res-name"></span> (<span id="res-id"></span>)</span>
                         <span>Time: <span id="res-time"></span></span>
                    </div>
                    <div id="sheet-status" class="mt-4 text-sm font-medium text-slate-400">Waiting to send...</div>

            </div>
        </div>
    </div>

    <script>
        // --- DATA READY FOR PET (Tests 5 - 8) ---
        const db = [
            {
                id: "test5",
                title: "Staycations",
                content_html: `<p>Have a holiday and stay at home too!</p><p>When thinking about a holiday, a lot of people imagine exotic beaches or distant capital cities, but the truth is that we don’t always have enough time or money to actually get to those places. At the same time, it’s very easy to forget the many wonderful places that we have close to home. <span class="drop-zone" data-id="16">[16]</span> Think about it: how many of your friends have ever visited the most important tourist attractions in your town? And what about you?</p><p>This is what a staycation is for. The word – a mix of ‘stay’ and ‘vacation’ – means staying at home during your holiday time and visiting somewhere for the day, but returning home to sleep in your own bed.</p><p>So, what are the advantages of a staycation? <span class="drop-zone" data-id="17">[17]</span> Firstly, you can save time. If you only have a few days free, with a long distance holiday you can waste a lot of time travelling to your destination. By the time you get there, it’s almost time to come home! <span class="drop-zone" data-id="18">[18]</span> You don’t have to pay money for a hotel, and travelling expenses are low. This means you have more money to spend on the local attractions or eating out in restaurants, for example.</p><p><span class="drop-zone" data-id="19">[19]</span> For example, you should visit things like castles, museums and monuments in your area, but also beaches if you are near the coast and attractions like theme parks if that’s what interests you. It’s vital that you avoid just spending the time doing housework or sitting in front of your TV. <span class="drop-zone" data-id="20">[20]</span> It only takes a little imagination to make a staycation active, fun and enjoyable for all the family.</p>`,
                options: [
                    { id: "A", text: "Visiting local tourist spots can be just as rewarding as traveling abroad." },
                    { id: "B", text: "Spending time at home might make you appreciate your surroundings more." },
                    { id: "C", text: "You’ll enjoy the experience of staying in a luxury hotel." },
                    { id: "D", text: "It’s also a great way to support local businesses." },
                    { id: "E", text: "This means you can have more flexibility with your schedule." },
                    { id: "F", text: "You should plan activities just as you would for a traditional holiday." },
                    { id: "G", text: "It’s easy to forget the attractions in your local area." },
                    { id: "H", text: "You can often overlook what’s right in front of you." }
                ],
                // Updated key 17 to E (Flexibility) to match context "save time". Original input C is contradictory.
                answers: { 16: "H", 17: "E", 18: "D", 19: "A", 20: "F" },
                explanations: `
                    <strong>16. H: [Lexical Link / Rephrase]</strong><br>Trước gap nhắc đến "forget wonderful places close to home". Câu H "Overlook what’s right in front of you" là cách diễn đạt tương đương (Quên những nơi gần nhà ~ Bỏ qua những gì ngay trước mắt).<br><br>
                    <strong>17. E: [Contextual Logic / Benefit]</strong><br>Câu trước hỏi về "advantages" (lợi ích). Câu sau nêu "Firstly, you can save time". Câu E "Flexibility with your schedule" là một lợi ích logic dẫn đến việc tiết kiệm thời gian, phù hợp hơn là C (Luxury hotel - mâu thuẫn với định nghĩa ngủ ở nhà).<br><br>
                    <strong>18. D: [Addition / Financial Benefit]</strong><br>Đoạn văn đang nói về lợi ích. Sau gap là "don't pay for hotel... more money to spend on local attractions". Câu D "Support local businesses" phù hợp với ý tiêu tiền tại địa phương được nhắc đến ngay sau đó.<br><br>
                    <strong>19. A: [Topic Sentence / Exemplification]</strong><br>Sau gap bắt đầu bằng "For example, you should visit...". Câu A "Visiting local tourist spots can be rewarding" đóng vai trò câu chủ đề giới thiệu ý tưởng tham quan địa phương được ví dụ chi tiết ở sau.<br><br>
                    <strong>20. F: [Advice / Contrast]</strong><br>Trước gap khuyên "avoid housework/TV" (tránh làm việc nhà/xem TV). Câu F "Plan activities just as... traditional holiday" là lời khuyên hành động tích cực để thay thế, dẫn đến kết luận "active, fun" ở câu cuối.
                `
            },
            {
                id: "test6",
                title: "Yoga for Teens",
                content_html: `<p>14-year-old Sienna Davis tells us her secret for happiness</p><p>Sienna no longer panics when she has an important test to take. <span class="drop-zone" data-id="16">[16]</span> This is a simple, yet useful technique that she has learnt from doing yoga.</p><p>Sienna is a perfect example of how teenagers can benefit from yoga in a world that is getting more competitive every day. <span class="drop-zone" data-id="17">[17]</span> Like any other student she also goes to school so she has to get up very early to go to the swimming pool. On top of that she has to do her homework and at weekends she plays matches, too. ‘I’m so busy that I really need to have some time to relax,’ she says.</p><p>Yoga has lots of health benefits, too. <span class="drop-zone" data-id="18">[18]</span> It also improves balance and decreases the chance of getting sick. Teenagers who have tried doing it regularly all agree that it reduces anxiety and it even helps them sleep better. <span class="drop-zone" data-id="19">[19]</span></p><p>Finally, doing yoga regularly also helps teens to become more confident about their changing bodies. <span class="drop-zone" data-id="20">[20]</span> When this happens the practice of yoga can prevent weight gain.</p>`,
                options: [
                    { id: "A", text: "She plays water polo five times a week and has to swim an hour every morning." },
                    { id: "B", text: "This may help both younger and adult people to deal with everyday stress." },
                    { id: "C", text: "If you do it regularly, it can make you fitter and stronger." },
                    { id: "D", text: "Yoga teaches children to breathe right for relaxation." },
                    { id: "E", text: "For example, teenagers sometimes put on weight due to growth or stress." },
                    { id: "F", text: "It also allows them to calm down and focus before any stressful event." },
                    { id: "G", text: "If she doesn’t know an answer, she simply takes a deep breath and focuses." },
                    { id: "H", text: "It helped her to improve her physical and mental health." }
                ],
                answers: { 16: "G", 17: "A", 18: "C", 19: "F", 20: "E" },
                explanations: `
                    <strong>16. G: [Reference / Process]</strong><br>Trước gap nói Sienna không còn hoảng loạn ("no longer panics"). Câu G mô tả hành động cụ thể "takes a deep breath and focuses" (hít sâu và tập trung) mà sau đó được gọi là "simple, yet useful technique" (kỹ thuật đơn giản nhưng hữu ích).<br><br>
                    <strong>17. A: [Elaboration / Context]</strong><br>Đoạn văn nói về thế giới cạnh tranh ("competitive"). Câu A liệt kê lịch trình dày đặc "plays water polo... swim an hour" để minh họa cho sự bận rộn và áp lực của Sienna.<br><br>
                    <strong>18. C: [Topic / Addition]</strong><br>Trước gap giới thiệu "health benefits" (lợi ích sức khỏe). Câu C "make you fitter and stronger" là một lợi ích sức khỏe cụ thể, được nối tiếp bằng "It *also* improves balance..." (Nó *cũng* cải thiện thăng bằng).<br><br>
                    <strong>19. F: [Addition / Mental Benefit]</strong><br>Trước gap liệt kê lợi ích giảm lo âu ("reduces anxiety"). Câu F "allows them to calm down and focus" bổ sung thêm lợi ích về tinh thần, phù hợp với mạch văn.<br><br>
                    <strong>20. E: [Cause & Effect Link]</strong><br>Đoạn văn nói về "changing bodies" (cơ thể thay đổi). Câu E nhắc đến việc "put on weight" (tăng cân). Điều này dẫn đến câu kết luận "prevent weight gain" (ngăn ngừa tăng cân) ở sau.
                `
            },
            {
                id: "test7",
                title: "The origins of the Olympic Games",
                content_html: `<p>The greatest show of sporting excellence in the world began thousands of years ago in Olympia as a part of a religious festival to the Greek god Zeus. The first Olympic Games were held in 776 BC. <span class="drop-zone" data-id="16">[16]</span> Back then time was measured in four-year periods known as Olympiads.</p><p>The ancient Greeks believed that competition encouraged excellence. The Olympics were not only celebrated with sporting events, though. <span class="drop-zone" data-id="17">[17]</span> You can read about them all in classical works of literature like Homer’s Iliad or Virgil’s Aeneid.</p><p>For the first thirteen games the ancient Greek Olympic Games featured just one event known as the 200-yard dash, a race where athletes had to run as fast as they could. <span class="drop-zone" data-id="18">[18]</span> The new competitions included boxing, donkey riding and even a foot race: the competitors had to wear heavy equipment. After some time the five different sports were given the name of pentathlon. There was also another competition called pankration, where two competitors had to fight each other in any way they liked. <span class="drop-zone" data-id="19">[19]</span></p><p>In 391 AD, however, the Roman emperor Theodosius stopped these ancient Greek practices, so the world had to say goodbye to the Olympic Games. <span class="drop-zone" data-id="20">[20]</span> Today, the summer and winter Olympics bring thousands of world-class champions from all around the world, uniting billions of fans for the world’s most exciting sporting competition.</p>`,
                options: [
                    { id: "A", text: "The first Olympic champion in 776 BC was a baker named Coreobus." },
                    { id: "B", text: "It was in 1896 that the modern Olympic Games were held again in Athens, Greece." },
                    { id: "C", text: "This year became the basis for the earliest Greek calendar." },
                    { id: "D", text: "The only thing that wasn’t allowed was biting." },
                    { id: "E", text: "Then, over time new exciting contests were added." },
                    { id: "F", text: "Music, singing and poetry contests were held as well." },
                    { id: "G", text: "This feeling was shared by many of the athletes." },
                    { id: "H", text: "The origin of the Olympics Games is surrounded by mystery and legend." }
                ],
                answers: { 16: "C", 17: "F", 18: "E", 19: "D", 20: "B" },
                explanations: `
                    <strong>16. C: [Reference / Time]</strong><br>Trước gap nhắc đến mốc thời gian "776 BC". Câu C "This year..." tham chiếu trực tiếp đến năm đó và giải thích vai trò của nó trong lịch Hy Lạp, dẫn đến ý "time was measured..." ở sau.<br><br>
                    <strong>17. F: [Contrast / Addition]</strong><br>Trước gap nói Olympics "not only... sporting events" (không chỉ thể thao). Câu F "Music, singing and poetry contests..." liệt kê các sự kiện phi thể thao, hoàn thiện ý "không chỉ... mà còn...".<br><br>
                    <strong>18. E: [Sequence / Transition]</strong><br>Trước gap nói ban đầu chỉ có một sự kiện ("just one event"). Câu E "Then, over time new... added" đánh dấu sự chuyển đổi sang việc thêm các môn mới, được liệt kê ngay sau đó ("boxing, donkey riding...").<br><br>
                    <strong>19. D: [Specific Detail]</strong><br>Trước gap mô tả môn "pankration" nơi đấu sĩ đánh nhau "in any way they liked" (bất cứ cách nào). Câu D "The only thing that wasn’t allowed was biting" đưa ra ngoại lệ duy nhất cho luật lệ tự do đó.<br><br>
                    <strong>20. B: [Chronological Jump]</strong><br>Trước gap nói Olympics bị dừng vào năm 391 AD. Câu B "It was in 1896..." nhảy cóc thời gian đến khi Olympics hiện đại được tổ chức lại, làm cầu nối dẫn đến câu kết về Olympics "Today" (ngày nay).
                `
            },
            {
                id: "test8",
                title: "Body art",
                content_html: `<p>Do you think of yourself as a living work of art? Is there a picture or a name of someone that is so important to you that you would want it on your skin forever? It’s clear that many people do. <span class="drop-zone" data-id="16">[16]</span></p><p>Although tattoos might seem to be a modern part of fashion, they have actually been with us for a very long time. <span class="drop-zone" data-id="17">[17]</span> It seems that some of the first tattoos were a kind of treatment for illness. Archaeologists who research ancient Egypt have also discovered signs that images and symbols were painted on the skin. <span class="drop-zone" data-id="18">[18]</span></p><p>It’s important to remember that a tattoo is supposed to be permanent. <span class="drop-zone" data-id="19">[19]</span> However, even though it isn’t easy, quite a lot of people change their mind and decide to get rid of their body tattoo. The most common reason for this is because they have a tattoo of someone’s name.</p><p>Although tattoos are very common and generally accepted, you should still take your time before you get one. <span class="drop-zone" data-id="20">[20]</span> When you are older and go for your interview for a job or a place at university, do you really want a tattoo to be showing? If not, choose a place on your body where it can be covered by clothes. For example, many women choose the ankle and for men the back of the shoulder is often a popular place.</p>`,
                options: [
                    { id: "A", text: "They think they were put there to bring good luck." },
                    { id: "B", text: "It’s also important to think where on your body you want to have your tattoo." },
                    { id: "C", text: "Other people wear jewellery instead." },
                    { id: "D", text: "In the United States, for example, more than a quarter of adults have a tattoo." },
                    { id: "E", text: "Tattoos were done differently in the past." },
                    { id: "F", text: "The earliest evidence of tattoos is from around 5,000 years ago in central Europe." },
                    { id: "G", text: "It’s a good idea to check with your parents before getting a tattoo." },
                    { id: "H", text: "It is possible to get your tattoo removed, but that will involve more pain and more money." }
                ],
                answers: { 16: "D", 17: "F", 18: "A", 19: "H", 20: "B" },
                explanations: `
                    <strong>16. D: [Exemplification]</strong><br>Trước gap nói "many people do" (nhiều người xăm mình). Câu D đưa ra số liệu thống kê cụ thể "In the United States... more than a quarter..." để chứng minh cho ý "nhiều người".<br><br>
                    <strong>17. F: [Historical Evidence]</strong><br>Trước gap nói hình xăm đã có từ "very long time". Câu F "earliest evidence... 5,000 years ago" cung cấp bằng chứng lịch sử cụ thể cho sự lâu đời đó.<br><br>
                    <strong>18. A: [Reference / Purpose]</strong><br>Trước gap nhắc đến "images and symbols were painted". Câu A "They think they were put there to bring good luck" giải thích mục đích tâm linh của những hình vẽ đó ("They" ám chỉ các nhà khảo cổ hoặc người xưa).<br><br>
                    <strong>19. H: [Contrast / Link]</strong><br>Trước gap nhấn mạnh hình xăm là "permanent" (vĩnh viễn). Câu H "possible to get your tattoo removed..." tạo sự tương phản nhẹ (có thể xóa nhưng tốn kém), dẫn đến câu sau "However... quite a lot of people change their mind".<br><br>
                    <strong>20. B: [Topic / Advice]</strong><br>Trước gap khuyên "take your time" (cân nhắc kỹ). Câu B "think where on your body..." chuyển sang lời khuyên về vị trí xăm, dẫn đến các ví dụ về vị trí ("ankle", "shoulder") ở câu cuối.
                `
            }
        ];

        var thoiGianBatDau = new Date();

        function guiKetQua10Cot(tenBai, maHS, tenHS, diemSo, phanTram, thoiGianLamBai) {
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzKnfEohBoagjHJmRPSM4uhSoEKeykBkzS-6DTy476UyddLxc-b8zptoQU6v8C94Nw14A/exec"; 
            const statusEl = document.getElementById('sheet-status');
            if(statusEl) statusEl.textContent = "Đang gửi dữ liệu...";

            var gio = thoiGianBatDau.getHours();
            var phut = thoiGianBatDau.getMinutes();
            var giay = thoiGianBatDau.getSeconds();
            var gioBatDauString = (gio < 10 ? '0'+gio : gio) + ":" + (phut < 10 ? '0'+phut : phut) + ":" + (giay < 10 ? '0'+giay : giay);

            var duLieu = {
                tenSheet: "PET Reading Part 4 - Ready for PET Tests 5-8", 
                tenBai: tenBai,            
                maHocSinh: maHS,
                hoTen: tenHS,
                gioBatDau: gioBatDauString,
                thoiGianLam: thoiGianLamBai, 
                soCauDung: diemSo,         
                phanTram: phanTram         
            };

            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(duLieu)
            }).then(() => {
                if(statusEl) statusEl.innerHTML = '<span class="text-green-600"><i class="fas fa-check-circle"></i> Kết quả đã được lưu thành công!</span>';
                alert("✅ Submission Successful!");
            }).catch(err => {
                if(statusEl) statusEl.innerHTML = '<span class="text-red-500">Submission failed</span>';
            });
        }

        const app = {
            state: {
                currentTestIdx: 0,
                userName: "Student",
                studentId: "",
                startTime: null,
                userAnswers: {}, 
                draggedId: null,
                attemptsLeft: 2, 
                testCompleted: false,
                testPassed: false 
            },

            startExam() {
                const name = document.getElementById('user-name-input').value.trim();
                const id = document.getElementById('user-id-input').value.trim();
                
                if (!name) { alert("Please enter your name!"); return; }
                
                thoiGianBatDau = new Date();
                this.state.userName = name;
                this.state.studentId = id;
                this.state.startTime = thoiGianBatDau; 
                
                document.getElementById('header-name').textContent = name;
                document.getElementById('screen-welcome').classList.add('hidden');
                document.getElementById('screen-app').classList.remove('hidden');
                document.getElementById('screen-app').classList.add('flex');
                
                this.startTimer();
                this.renderTest();
            },

            startTimer() {
                setInterval(() => {
                    const now = new Date();
                    const diff = now - this.state.startTime;
                    const d = new Date(diff);
                    document.getElementById('timer-display').textContent = d.toISOString().substr(11, 8);
                }, 1000);
            },

            renderTest() {
                const test = db[this.state.currentTestIdx];
                
                document.getElementById('text-title').textContent = test.title;
                document.getElementById('header-title').textContent = `Test ${this.state.currentTestIdx + 5}`;
                document.getElementById('header-progress').textContent = `${this.state.currentTestIdx + 1}/${db.length}`;
                
                const expBox = document.getElementById('explanation-box');
                const expContent = document.getElementById('explanation-content');
                
                if (this.state.testCompleted && this.state.testPassed) {
                    expBox.classList.remove('hidden');
                    expContent.innerHTML = test.explanations;
                } else {
                    expBox.classList.add('hidden');
                    expContent.innerHTML = '';
                }
                
                document.getElementById('attempts-display').textContent = `Attempts left: ${this.state.attemptsLeft}`;

                const contentDiv = document.getElementById('reading-content');
                if (contentDiv.getAttribute('data-test-id') !== test.id) {
                     contentDiv.innerHTML = test.content_html;
                     contentDiv.setAttribute('data-test-id', test.id);
                     
                     const gaps = contentDiv.querySelectorAll('.drop-zone');
                     gaps.forEach(gap => {
                        const qId = gap.getAttribute('data-id');
                        const key = `${test.id}-${qId}`;
                        const savedAns = this.state.userAnswers[key];
                        
                        if (savedAns) {
                            this.fillGapUI(gap, savedAns);
                        } else {
                             gap.className = 'drop-zone';
                             gap.innerHTML = `[${qId}]`;
                             gap.ondragover = (e) => this.allowDrop(e);
                             gap.ondrop = (e) => this.drop(e);
                        }
                        
                        gap.onclick = () => {
                             if (!this.state.testCompleted) this.handleGapClick(test.id, qId);
                        };
                    });
                } else {
                     const gaps = contentDiv.querySelectorAll('.drop-zone');
                     gaps.forEach(gap => {
                        const qId = gap.getAttribute('data-id');
                        const key = `${test.id}-${qId}`;
                        const savedAns = this.state.userAnswers[key];

                        if (this.state.testCompleted) {
                            gap.onclick = null;
                            gap.ondragover = null;
                            gap.ondrop = null;
                        }

                        if (savedAns) {
                             if (!gap.innerHTML.includes(savedAns)) {
                                 this.fillGapUI(gap, savedAns);
                             }
                        } else {
                             if (gap.classList.contains('filled')) {
                                 gap.className = 'drop-zone';
                                 gap.innerHTML = `[${qId}]`;
                             }
                        }
                     });
                }

                this.renderOptions(test);

                const btnCheck = document.getElementById('btn-check');
                const btnNext = document.getElementById('btn-next');
                
                if (this.state.testCompleted) {
                    btnCheck.classList.add('hidden');
                    btnNext.classList.remove('hidden');
                    if (this.state.currentTestIdx === db.length - 1) {
                         btnNext.innerHTML = 'Finish Exam <i class="fas fa-flag-checkered"></i>';
                         btnNext.onclick = () => this.finishExam();
                    } else {
                         btnNext.innerHTML = 'Next Test <i class="fas fa-arrow-right"></i>';
                         btnNext.onclick = () => this.nextTest();
                    }
                } else {
                    btnCheck.classList.remove('hidden');
                    btnNext.classList.add('hidden');
                }
            },

            renderOptions(test) {
                const container = document.getElementById('options-container');
                container.innerHTML = '';

                test.options.forEach(opt => {
                    const isUsed = Object.entries(this.state.userAnswers).some(([k, v]) => k.startsWith(test.id) && v === opt.id);
                    
                    const div = document.createElement('div');
                    div.className = `draggable-item bg-white border border-slate-200 p-3 rounded-lg shadow-sm hover:shadow-md transition-all text-sm ${isUsed ? 'used' : ''}`;
                    if (!isUsed && !this.state.testCompleted) {
                        div.draggable = true;
                        div.ondragstart = (e) => this.drag(e, opt.id, opt.text);
                        div.ontouchstart = (e) => this.touchStart(e, opt.id, opt.text);
                    }
                    div.innerHTML = `<span class="font-bold text-rose-600 mr-2">[${opt.id}]</span> ${opt.text}`;
                    container.appendChild(div);
                });
            },

            drag(ev, optId, optText) {
                this.state.draggedId = { id: optId, text: optText };
                ev.dataTransfer.setData("text", JSON.stringify({id: optId, text: optText}));
            },
            
            allowDrop(ev) { ev.preventDefault(); ev.target.classList.add('hovered'); },
            
            drop(ev) {
                ev.preventDefault();
                const target = ev.target.closest('.drop-zone');
                if (!target) return;
                target.classList.remove('hovered');
                
                let data = this.state.draggedId;
                if (!data && ev.dataTransfer) {
                     try { data = JSON.parse(ev.dataTransfer.getData("text")); } catch(e){}
                }
                
                if (data) {
                    const qId = target.getAttribute('data-id');
                    this.state.userAnswers[`${db[this.state.currentTestIdx].id}-${qId}`] = data.id;
                    this.renderTest();
                }
            },

            handleGapClick(testId, qId) {
                const key = `${testId}-${qId}`;
                if (this.state.userAnswers[key]) {
                    delete this.state.userAnswers[key];
                    this.renderTest();
                }
            },

            fillGapUI(gapEl, optId) {
                const test = db[this.state.currentTestIdx];
                const optText = test.options.find(o => o.id === optId)?.text || "";
                
                gapEl.className = 'drop-zone filled'; 
                gapEl.innerHTML = `<span class="uppercase text-rose-800 mr-1">[${optId}]</span><span class="font-extrabold">${optText}</span>`;
            },

            checkAnswers() {
                const test = db[this.state.currentTestIdx];
                let correctCount = 0;
                let answeredCount = 0;
                const totalQuestions = Object.keys(test.answers).length; 

                document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    if (this.state.userAnswers[`${test.id}-${qId}`]) answeredCount++;
                });

                if (answeredCount < totalQuestions) {
                    alert("Please fill all gaps before checking.");
                    return;
                }

                document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    const userAns = this.state.userAnswers[`${test.id}-${qId}`];
                    if (userAns && userAns === test.answers[qId]) correctCount++;
                });

                if (correctCount >= 4) {
                    this.showFeedback(true); // PASSED
                } else {
                    if (this.state.attemptsLeft > 0) {
                        this.state.attemptsLeft--;
                        alert(`Incorrect. You need at least 4 correct answers. You have ${this.state.attemptsLeft} attempt(s) left.`);
                        this.highlightErrorsOnly(); 
                    } else {
                        this.showFeedback(false); // FAILED
                    }
                }
            },

            highlightErrorsOnly() {
                 const test = db[this.state.currentTestIdx];
                 document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    const userAns = this.state.userAnswers[`${test.id}-${qId}`];
                    
                    gap.className = 'drop-zone filled'; // Reset
                    
                    if (userAns && userAns !== test.answers[qId]) {
                        gap.classList.add('wrong'); // Add Red style
                    }
                 });
            },

            showFeedback(passed) {
                this.state.testCompleted = true;
                this.state.testPassed = passed;
                
                const test = db[this.state.currentTestIdx];

                document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    const userAns = this.state.userAnswers[`${test.id}-${qId}`];
                    const correctAns = test.answers[qId];
                    
                    gap.className = 'drop-zone filled'; // Reset

                    if (passed) {
                        if (userAns === correctAns) {
                            gap.classList.add('correct'); // Green style
                        } else {
                            gap.classList.add('wrong'); // Red style
                        }
                    } else {
                        if (userAns !== correctAns) {
                            gap.classList.add('wrong');
                        }
                    }
                });

                if (passed) {
                    alert("Great job! You passed this test (>= 4 correct).");
                } else {
                    alert("Out of attempts. Moving to next part.");
                }

                this.renderTest(); 
            },

            nextTest() {
                this.state.currentTestIdx++;
                this.state.attemptsLeft = 2; 
                this.state.testCompleted = false;
                this.state.testPassed = false;
                this.renderTest();
            },

            finishExam() {
                const endTime = new Date();
                const diffMs = endTime - this.state.startTime;
                const minutes = Math.floor(diffMs / 60000);
                const seconds = Math.floor(((diffMs % 60000) / 1000));
                const durationStr = `${minutes} min ${seconds} sec`;

                let score = 0;
                let totalQ = 0;

                db.forEach(test => {
                    const qIds = Object.keys(test.answers);
                    totalQ += qIds.length;
                    
                    qIds.forEach(qId => {
                        const key = `${test.id}-${qId}`;
                        const userAns = this.state.userAnswers[key];
                        if (userAns === test.answers[qId]) score++;
                    });
                });

                const percent = totalQ > 0 ? Math.round((score / totalQ) * 100) : 0;

                guiKetQua10Cot(
                    "PET Reading Part 4 - Ready for PET Tests 5-8", 
                    this.state.studentId,
                    this.state.userName, 
                    score + "/" + totalQ,
                    percent + "%",
                    durationStr
                );

                document.getElementById('screen-app').classList.add('hidden');
                document.getElementById('screen-result').classList.remove('hidden');
                document.getElementById('result-score').textContent = score;
                document.getElementById('result-score').nextElementSibling.textContent = "/" + totalQ;
                document.getElementById('result-percent').textContent = `${percent}%`;
                document.getElementById('res-name').textContent = this.state.userName;
                document.getElementById('res-id').textContent = this.state.studentId;
                document.getElementById('res-time').textContent = durationStr;
            },

            touchStart(ev, optId, text) {
                this.state.draggedId = { id: optId, text: text };
                document.querySelectorAll('.drop-zone').forEach(el => el.style.borderColor = '#e11d48');
            }
        };
    </script>
</body>
</html>
