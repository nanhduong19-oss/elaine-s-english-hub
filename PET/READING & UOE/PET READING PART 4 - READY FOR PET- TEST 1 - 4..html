<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET Reading Part 4 - Drag & Drop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* --- DRAG & DROP STYLES --- */
        
        /* 1. Base Drop Zone (Empty - Rose Theme for PET) */
        .drop-zone {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: auto;
            min-width: 45px;
            height: 28px;
            margin: 0 4px;
            background-color: #fff1f2; /* Rose-50 */
            border: 2px dashed #fda4af; /* Rose-300 */
            border-radius: 6px;
            transition: all 0.2s ease;
            color: #be123c; /* Rose-700 */
            font-weight: 700;
            font-size: 0.85em;
            padding: 0 6px;
            vertical-align: middle;
            cursor: pointer;
        }

        .drop-zone.hovered {
            background-color: #fce7f3;
            border-color: #db2777;
            transform: scale(1.1);
        }

        /* 2. FILLED STATE (Bình thường: Đen, Đậm, Không nền, Không viền) */
        .drop-zone.filled {
            display: inline; 
            width: auto;
            height: auto;
            margin: 0 2px;
            padding: 2px 6px;
            
            /* Visuals: Transparent & No Border */
            background-color: transparent !important; 
            border: none !important; 
            border-radius: 4px;
            border-bottom: 2px solid transparent !important; /* Để dành cho hover */
            
            /* Typography: Black Text by default */
            color: #000000 !important; 
            font-size: 1em;
            font-weight: 800; /* In đậm */
            line-height: 1.6;
            text-align: left;
            box-shadow: none !important;
            white-space: normal;
        }
        
        /* Hover vào câu đã điền: Hiện gạch chân hồng */
        .drop-zone.filled:hover {
            border-bottom: 2px solid #be123c !important; 
            background-color: #fff1f2 !important; /* Feedback nhẹ khi hover */
        }
        
        .drop-zone.filled:hover::after {
            content: ' ✕';
            font-size: 0.8em;
            color: #ef4444;
            margin-left: 5px;
        }

        /* 3. CORRECT STATE (Đúng: Chữ Xanh đậm, Nền Xanh nhạt, Tích) */
        .drop-zone.filled.correct {
            background-color: #dcfce7 !important; /* Light Green Bg */
            color: #15803d !important; /* Dark Green Text */
            border: 1px solid #86efac !important;
            border-bottom: 1px solid #86efac !important;
            padding-right: 28px !important; /* Chừa chỗ cho icon */
            position: relative;
            pointer-events: none; /* Khóa */
        }

        .drop-zone.filled.correct::after {
            content: '\f00c'; /* FontAwesome Check Icon */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8em;
            color: #15803d;
            margin-left: 0;
        }

        /* 4. WRONG STATE (Sai: Chữ Đỏ đậm, Nền Đỏ nhạt, X) */
        .drop-zone.filled.wrong {
            background-color: #fee2e2 !important; /* Light Red Bg */
            color: #b91c1c !important; /* Dark Red Text */
            border: 1px solid #fca5a5 !important;
            border-bottom: 1px solid #fca5a5 !important;
            padding-right: 28px !important; /* Chừa chỗ cho icon */
            position: relative;
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        .drop-zone.filled.wrong::after {
            content: '\f00d'; /* FontAwesome X Icon */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8em;
            color: #b91c1c;
            margin-left: 0;
        }

        .draggable-item { cursor: grab; user-select: none; touch-action: none; }
        .draggable-item:active { cursor: grabbing; }
        .draggable-item.dragging { opacity: 0.5; transform: scale(0.95); }
        .draggable-item.used {
            opacity: 0.4;
            pointer-events: none;
            background-color: #f1f5f9;
            filter: grayscale(100%);
            border-style: dashed;
            color: #94a3b8;
        }

        .reading-content p { margin-bottom: 1.5em; line-height: 2.2; text-align: justify; }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        #questions-container { overflow-anchor: none !important; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col text-slate-800 overflow-hidden">

        <div class="bg-white max-w-md w-full rounded-2xl shadow-xl border border-slate-100 overflow-hidden">

                <h1 class="text-3xl font-extrabold text-slate-800 mb-2">PET Reading Part 4</h1>

                <div class="inline-block bg-rose-100 text-rose-700 px-4 py-1 rounded-full text-xs font-bold tracking-wider mb-8">
                    DRAG & DROP MODE
                </div>

        <header class="bg-white border-b border-slate-200 h-16 flex-none z-20">
            <div class="h-full max-w-[1920px] mx-auto px-6 flex justify-between items-center">

                    <div class="px-3 py-1 bg-rose-50 border border-rose-200 rounded-lg text-rose-700 font-mono font-bold text-sm flex items-center gap-2">

        <!-- Main Content -->

                <div class="w-full lg:w-[65%] h-1/2 lg:h-full bg-white border-r border-slate-200 overflow-y-auto custom-scrollbar p-6 lg:p-10 relative">
                    <div class="max-w-4xl mx-auto pb-20">
                        <h3 class="font-bold text-slate-400 text-xs uppercase tracking-wider mb-2">Reading Article</h3>

                        <div id="explanation-box" class="hidden mt-8 p-6 bg-rose-50 rounded-xl border border-rose-200">
                            <h4 class="font-bold text-rose-800 mb-4 flex items-center gap-2"><i class="fas fa-lightbulb"></i> Explanations</h4>
                            <div id="explanation-content" class="space-y-3 text-sm text-rose-900"></div>

                <!-- Options Area -->
                <div class="w-full lg:w-[35%] h-1/2 lg:h-full bg-slate-50 flex flex-col border-t lg:border-t-0 border-slate-200 shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)] z-10">

                        <h3 class="font-bold text-rose-700 flex items-center gap-2 text-sm uppercase tracking-wider">

                        </h3>

    <!-- SCREEN 3: RESULT -->
    <div id="screen-result" class="hidden fixed inset-0 z-50 bg-slate-50 overflow-y-auto custom-scrollbar">
        <div class="min-h-screen w-full flex items-start justify-center p-6 md:py-12">

                    </div>
                    <div id="result-percent" class="text-slate-500 font-medium mb-6">0%</div>
                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-100 flex justify-between text-sm font-bold text-slate-600">
                         <span>Candidate: <span id="res-name"></span> (<span id="res-id"></span>)</span>
                         <span>Time: <span id="res-time"></span></span>
                    </div>

    <script>
        // --- DATA READY FOR PET (Tests 1 - 4) ---
        const db = [
            {
                id: "test1",
                title: "Interactive films",
                content_html: `<p>Interactive cinema is a form of entertainment which mixes traditional filmmaking and video game technology. In an interactive movie, the audience is given the power to decide what choices the main character must make at crucial moments of the story. <span class="drop-zone" data-id="16">[16]</span></p><p>Though most people think it is a very recent invention, the first interactive film, Kinoautomat, was made by a Czech director in the 1960s. In this early version, the movie was interrupted and the audience was asked to choose between two possible scenes and to vote for the one they wanted to be shown next. <span class="drop-zone" data-id="17">[17]</span></p><p>It was after the invention of CD-ROMs that game developers started to realise they could combine traditional filming methods and new technological possibilities. This is how movie makers started to film live actors on a green screen. <span class="drop-zone" data-id="18">[18]</span></p><p>In the 2000s there were new attempts at creating interactive movies. <span class="drop-zone" data-id="19">[19]</span> One of the main problems was the limited options the viewers had in giving shape to their own plot and conclusion. However, things seem to have changed since the recent release of Bandersnatch. <span class="drop-zone" data-id="20">[20]</span> With its 6 viewer options and 5 different endings the episode has received favourable reviews from both critic and the audience.</p>`,
                options: [
                    { id: "A", text: "A short tutorial explains to the viewer how to make choices." },
                    { id: "B", text: "Despite this, people appeared to lose interest in the genre." },
                    { id: "C", text: "But then something unusual happens." },
                    { id: "D", text: "Whatever decision was made, however, the film ending was the same." },
                    { id: "E", text: "It is an interactive episode of a popular sci-fi series that came out in 2018." },
                    { id: "F", text: "The filmed scene could then be moved onto a chosen digital background." },
                    { id: "G", text: "But the idea itself is even older." },
                    { id: "H", text: "Since there are different possible developments, the end depends on each viewer." }
                ],
                answers: { 16: "H", 17: "D", 18: "F", 19: "B", 20: "E" },
                explanations: `
                    <strong>16. H: [Logical Consequence]</strong><br>Trước gap nói về việc khán giả quyết định lựa chọn của nhân vật. Câu H "Since there are different possible developments, the end depends on each viewer" là hệ quả logic của việc có nhiều lựa chọn đó.<br><br>
                    <strong>17. D: [Contrast / Limitation]</strong><br>Trước gap nói khán giả được chọn giữa 2 cảnh. Câu D "Whatever decision was made, however, the film ending was the same" tạo sự tương phản về giới hạn của công nghệ thời đó (dù chọn gì thì kết vẫn như nhau).<br><br>
                    <strong>18. F: [Process / Lexical Link]</strong><br>Trước gap nhắc đến kỹ thuật "film live actors on a green screen". Câu F "The filmed scene could then be moved onto a chosen digital background" giải thích tiếp quy trình xử lý cảnh quay đó (green screen -> digital background).<br><br>
                    <strong>19. B: [Contrast / Negative Result]</strong><br>Trước gap nói về "new attempts" (nỗ lực mới). Câu B "Despite this, people appeared to lose interest..." nêu kết quả tiêu cực. Điều này dẫn đến câu sau giải thích "One of the main problems was...".<br><br>
                    <strong>20. E: [Definition / Reference]</strong><br>Trước gap nhắc đến "release of Bandersnatch". Câu E "It is an interactive episode..." định nghĩa và cung cấp thêm thông tin về Bandersnatch.
                `
            },
            {
                id: "test2",
                title: "How the violin changed my life",
                content_html: `<p>I was born into a family of doctors, so my parents were really surprised when I told them I wanted to be a violinist. At first, they thought it was just a temporary thing, since children often dream to do unusual jobs but they quickly change their mind when they grow up. <span class="drop-zone" data-id="16">[16]</span></p><p>Learning the violin is not a piece of cake: it means practising for hours every day, pain in your fingertips and neck, and a lot of disappointment. Most of the time, especially at the beginning, it sounds bad. <span class="drop-zone" data-id="17">[17]</span></p><p>Anyway, I kept taking classes and practising, until I joined an ensemble and that’s when the fun started. <span class="drop-zone" data-id="18">[18]</span> When you eventually perform in front of an audience, the joy you give to others with your music will make the whole effort worthwhile.</p><p>When I teach my students I always tell them I remember what it feels like when you can’t join in with your friends because you have to practise, so I often tell them about my childhood years. <span class="drop-zone" data-id="19">[19]</span></p><p>I have never regretted being a musician. <span class="drop-zone" data-id="20">[20]</span> She often jokes that I would be a terrible doctor, but in the end my job is not so different to hers: she cures people’s bodies, but I cure their souls.</p>`,
                options: [
                    { id: "A", text: "I realised playing with other musicians is one of the most thrilling experiences you can have." },
                    { id: "B", text: "My sister, who is a doctor, agrees that it was the best choice." },
                    { id: "C", text: "So after a few years I stopped taking lessons and took up the guitar." },
                    { id: "D", text: "This is why, during the first few years, I thought of giving up." },
                    { id: "E", text: "She doesn’t understand why I chose this job instead of being a doctor." },
                    { id: "F", text: "The violin is not as difficult to learn as you may think, though." },
                    { id: "G", text: "When I told them again three years later, however, they realised I was serious about my decision." },
                    { id: "H", text: "I also tell them I know what it takes to fight against those 4 strings and make them sound pleasant." }
                ],
                answers: { 16: "G", 17: "D", 18: "A", 19: "H", 20: "B" },
                explanations: `
                    <strong>16. G: [Time Sequence & Contrast]</strong><br>Trước gap nói bố mẹ nghĩ đó là sở thích "temporary" (tạm thời). Câu G "When I told them again three years later..." cho thấy sự thay đổi theo thời gian và chứng minh sự nghiêm túc của tác giả.<br><br>
                    <strong>17. D: [Cause & Result]</strong><br>Trước gap liệt kê khó khăn: "pain", "disappointment", "sounds bad". Câu D "This is why... I thought of giving up" là kết quả tâm lý tự nhiên từ những khó khăn đó.<br><br>
                    <strong>18. A: [Elaboration / Definition]</strong><br>Trước gap nhắc đến việc tham gia "ensemble" (ban nhạc) và "fun started". Câu A giải thích thêm rằng "playing with other musicians" (chơi cùng nhạc sĩ khác - tức là trong ensemble) là trải nghiệm tuyệt vời.<br><br>
                    <strong>19. H: [Addition / Parallelism]</strong><br>Đoạn văn có cấu trúc liệt kê những gì tác giả nói với học sinh: "I always tell them...", "I often tell them...". Câu H "I also tell them..." tiếp nối mạch liệt kê này.<br><br>
                    <strong>20. B: [Reference]</strong><br>Câu sau gap bắt đầu bằng "She often jokes...". Câu B giới thiệu nhân vật "My sister, who is a doctor", khớp với đại từ "She" và ngữ cảnh so sánh nghề nghiệp bác sĩ ở câu cuối.
                `
            },
            {
                id: "test3",
                title: "Gap Years",
                content_html: `<p>Have you decided what you want to do when you finish school? Do you think you’ll go to university? Today, having a gap year is something that many students do between leaving school and starting university. <span class="drop-zone" data-id="16">[16]</span> But a gap year can also be great for opening your mind, building your character and finding out about the world.</p><p>Many students use the gap year as a chance to travel around the world on a long holiday. <span class="drop-zone" data-id="17">[17]</span> But the idea is really to use this time to learn new skills and have new experiences before university, so lots of young people prefer to do something useful to help others. <span class="drop-zone" data-id="18">[18]</span> Companies like Raleigh International organise projects like this in different parts of the world, such as South America or Africa. Participants help local people and in return they learn a lot about themselves and develop new skills which are useful for their future.</p><p>Of course, if you are planning to have a gap year, you’ll need money. <span class="drop-zone" data-id="19">[19]</span> Many do evening and weekend jobs while they are still at school in order to finance their gap year. Some also find jobs in the different countries they visit while they are on the gap year, but you need to find out if you’ll be allowed to work in each country before you leave home. For example, in many places you may need a special work permit. <span class="drop-zone" data-id="20">[20]</span> You won’t want any unexpected surprises when you arrive at a border!</p>`,
                options: [
                    { id: "A", text: "For example, many work as volunteers on social or environmental projects." },
                    { id: "B", text: "You will also need to find out if you need to get a visa for any of the countries you plan to visit." },
                    { id: "C", text: "But there are lots of difficulties related to gap years, too." },
                    { id: "D", text: "After finishing school, it can be lots of fun to take time off before going back to studying." },
                    { id: "E", text: "Students’ parents always pay for the gap year." },
                    { id: "F", text: "Saving enough can be difficult, so most people work for a period before travelling." },
                    { id: "G", text: "You can do a gap year before going to university." },
                    { id: "H", text: "They want to see new places and meet new people." }
                ],
                answers: { 16: "H", 17: "D", 18: "A", 19: "F", 20: "B" },
                explanations: `
                    <strong>16. H: [Reference / Reason]</strong><br>Trước gap nhắc đến "many students". Câu H "They want to see new places..." dùng đại từ "They" để chỉ nhóm sinh viên này và giải thích lý do họ chọn gap year.<br><br>
                    <strong>17. D: [Synonym / Restatement]</strong><br>Trước gap nói về "travel around the world on a long holiday". Câu D "fun to take time off" là cách diễn đạt khác đồng nghĩa với việc nghỉ ngơi dài ngày đó.<br><br>
                    <strong>18. A: [Exemplification]</strong><br>Trước gap nói về việc "do something useful to help others". Câu A "For example, many work as volunteers..." đưa ra ví dụ cụ thể cho hành động giúp đỡ người khác đó.<br><br>
                    <strong>19. F: [Problem & Solution]</strong><br>Trước gap nêu vấn đề "you'll need money". Câu F "Saving enough can be difficult..." tiếp tục chủ đề tài chính và đưa ra giải pháp là "work for a period".<br><br>
                    <strong>20. B: [Lexical Link / Addition]</strong><br>Trước gap nói về "work permit" (giấy phép lao động). Câu B bổ sung thêm yêu cầu về "visa". Cả hai đều liên quan đến thủ tục nhập cảnh, dẫn đến ý "border" (biên giới) ở câu sau.
                `
            },
            {
                id: "test4",
                title: "Maths in the kitchen",
                content_html: `<p>I’ve been a Maths teacher for 20 years and I still enjoy doing my job. Teaching reminds you that you keep learning even when you are on the other side of the classroom. <span class="drop-zone" data-id="16">[16]</span> This is why it came as no surprise when I felt it was time for something new: I decided to go back to school and train to be a cook.</p><p>This wasn’t the first change I’d made in my life: I had studied Engineering at university and had gone to work for a software company. However, I left my job after three years to start teaching Maths and Physics at high school. <span class="drop-zone" data-id="17">[17]</span> For five years I was often worried about a test I had to take, or frustrated because one of my teachers had treated me unfairly. Of course, I also had to deal with a heavier workload because I had less time to prepare lesson plans, attend meetings and mark my students’ tests. <span class="drop-zone" data-id="18">[18]</span></p><p>I suppose being a student again made me a better teacher: we tend to forget what it means to get ready for an exam and we think teenagers shouldn’t complain about homework or strict teachers. <span class="drop-zone" data-id="19">[19]</span></p><p>When I finally passed my exam at the vocational cooking school I was thrilled and proud. <span class="drop-zone" data-id="20">[20]</span> That’s why I’m going to take a break for a year from my teaching job and go on to apply for a professional pastry and baking school. Next year I’ll forget about numbers and only focus on learning how to make delicious cakes and beautiful desserts. I’ve always been fond of cooking, especially cakes and desserts in general, so this will be a dream come true.</p>`,
                options: [
                    { id: "A", text: "It felt like opening the door to a whole new world of opportunities." },
                    { id: "B", text: "I started to feel bored with teaching so I stopped working at school." },
                    { id: "C", text: "Despite this experience, joining a 5-year evening course while teaching morning classes wasn’t exactly a piece of cake." },
                    { id: "D", text: "I’d like to work in a restaurant as a pastry chef in the future." },
                    { id: "E", text: "Studying can be very stressful." },
                    { id: "F", text: "My students gave me a lot of support during the final exam." },
                    { id: "G", text: "It also keeps you young at heart." },
                    { id: "H", text: "It was so hard that I sometimes wondered if I had made the right choice." }
                ],
                answers: { 16: "G", 17: "C", 18: "H", 19: "E", 20: "A" },
                explanations: `
                    <strong>16. G: [Thematic Link]</strong><br>Trước gap nói về việc "keep learning" (học hỏi không ngừng). Câu G "It also keeps you young at heart" bổ sung thêm một lợi ích tinh thần của việc học hỏi đó.<br><br>
                    <strong>17. C: [Context Match / Contrast]</strong><br>Đoạn văn đang kể về việc chuyển nghề sang dạy học. Câu C "joining a 5-year evening course while teaching..." cung cấp bối cảnh về việc vừa dạy vừa đi học thêm, dẫn đến các khó khăn được kể ở câu sau.<br><br>
                    <strong>18. H: [Result / Description]</strong><br>Trước gap mô tả khối lượng công việc nặng nề ("heavier workload"). Câu H "It was so hard that I sometimes wondered..." là kết quả cảm xúc của sự vất vả đó.<br><br>
                    <strong>19. E: [Summary]</strong><br>Trước gap nói về việc học sinh phàn nàn bài tập và giáo viên nghiêm khắc. Câu E "Studying can be very stressful" tóm tắt lại cảm giác áp lực của việc làm học sinh mà tác giả đã trải qua.<br><br>
                    <strong>20. A: [Emotional Link]</strong><br>Trước gap tác giả cảm thấy "thrilled and proud" (vui sướng và tự hào). Câu A "It felt like opening the door..." miêu tả cảm giác hân hoan trước những cơ hội mới, dẫn đến quyết định nghỉ dạy 1 năm ở câu sau.
                `
            }
        ];

        var thoiGianBatDau = new Date();

        function guiKetQua10Cot(tenBai, maHS, tenHS, diemSo, phanTram, thoiGianLamBai) {
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzKnfEohBoagjHJmRPSM4uhSoEKeykBkzS-6DTy476UyddLxc-b8zptoQU6v8C94Nw14A/exec"; 
            const statusEl = document.getElementById('sheet-status');
            if(statusEl) statusEl.textContent = "Đang gửi dữ liệu...";

            var gio = thoiGianBatDau.getHours();
            var phut = thoiGianBatDau.getMinutes();
            var giay = thoiGianBatDau.getSeconds();
            var gioBatDauString = (gio < 10 ? '0'+gio : gio) + ":" + (phut < 10 ? '0'+phut : phut) + ":" + (giay < 10 ? '0'+giay : giay);

            var duLieu = {
                tenSheet: "PET Reading Part 4 - Ready for PET Tests 1-4", 
                tenBai: tenBai,            
                maHocSinh: maHS,
                hoTen: tenHS,
                gioBatDau: gioBatDauString,
                thoiGianLam: thoiGianLamBai, 
                soCauDung: diemSo,         
                phanTram: phanTram         
            };

            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(duLieu)
            }).then(() => {
                if(statusEl) statusEl.innerHTML = '<span class="text-green-600"><i class="fas fa-check-circle"></i> Kết quả đã được lưu thành công!</span>';
                alert("✅ Submission Successful!");
            }).catch(err => {
                if(statusEl) statusEl.innerHTML = '<span class="text-red-500">Submission failed</span>';
            });
        }

        const app = {
            state: {
                currentTestIdx: 0,
                userName: "Student",
                studentId: "",
                startTime: null,
                userAnswers: {}, 
                draggedId: null,
                attemptsLeft: 2, 
                testCompleted: false,
                testPassed: false 
            },

            startExam() {
                const name = document.getElementById('user-name-input').value.trim();
                const id = document.getElementById('user-id-input').value.trim();
                
                if (!name) { alert("Please enter your name!"); return; }
                
                thoiGianBatDau = new Date();
                this.state.userName = name;
                this.state.studentId = id;
                this.state.startTime = thoiGianBatDau; 
                
                document.getElementById('header-name').textContent = name;
                document.getElementById('screen-welcome').classList.add('hidden');
                document.getElementById('screen-app').classList.remove('hidden');
                document.getElementById('screen-app').classList.add('flex');
                
                this.startTimer();
                this.renderTest();
            },

            startTimer() {
                setInterval(() => {
                    const now = new Date();
                    const diff = now - this.state.startTime;
                    const d = new Date(diff);
                    document.getElementById('timer-display').textContent = d.toISOString().substr(11, 8);
                }, 1000);
            },

            renderTest() {
                const test = db[this.state.currentTestIdx];
                
                document.getElementById('text-title').textContent = test.title;
                document.getElementById('header-title').textContent = `Test ${this.state.currentTestIdx + 1}`;
                document.getElementById('header-progress').textContent = `${this.state.currentTestIdx + 1}/${db.length}`;
                
                const expBox = document.getElementById('explanation-box');
                const expContent = document.getElementById('explanation-content');
                
                if (this.state.testCompleted && this.state.testPassed) {
                    expBox.classList.remove('hidden');
                    expContent.innerHTML = test.explanations;
                } else {
                    expBox.classList.add('hidden');
                    expContent.innerHTML = '';
                }
                
                document.getElementById('attempts-display').textContent = `Attempts left: ${this.state.attemptsLeft}`;

                const contentDiv = document.getElementById('reading-content');
                if (contentDiv.getAttribute('data-test-id') !== test.id) {
                     contentDiv.innerHTML = test.content_html;
                     contentDiv.setAttribute('data-test-id', test.id);
                     
                     const gaps = contentDiv.querySelectorAll('.drop-zone');
                     gaps.forEach(gap => {
                        const qId = gap.getAttribute('data-id');
                        const key = `${test.id}-${qId}`;
                        const savedAns = this.state.userAnswers[key];
                        
                        if (savedAns) {
                            this.fillGapUI(gap, savedAns);
                        } else {
                             gap.className = 'drop-zone';
                             gap.innerHTML = `[${qId}]`;
                             gap.ondragover = (e) => this.allowDrop(e);
                             gap.ondrop = (e) => this.drop(e);
                        }
                        
                        gap.onclick = () => {
                             if (!this.state.testCompleted) this.handleGapClick(test.id, qId);
                        };
                    });
                } else {
                     const gaps = contentDiv.querySelectorAll('.drop-zone');
                     gaps.forEach(gap => {
                        const qId = gap.getAttribute('data-id');
                        const key = `${test.id}-${qId}`;
                        const savedAns = this.state.userAnswers[key];

                        if (this.state.testCompleted) {
                            gap.onclick = null;
                            gap.ondragover = null;
                            gap.ondrop = null;
                        }

                        if (savedAns) {
                             if (!gap.innerHTML.includes(savedAns)) {
                                 this.fillGapUI(gap, savedAns);
                             }
                        } else {
                             if (gap.classList.contains('filled')) {
                                 gap.className = 'drop-zone';
                                 gap.innerHTML = `[${qId}]`;
                             }
                        }
                     });
                }

                this.renderOptions(test);

                const btnCheck = document.getElementById('btn-check');
                const btnNext = document.getElementById('btn-next');
                
                if (this.state.testCompleted) {
                    btnCheck.classList.add('hidden');
                    btnNext.classList.remove('hidden');
                    if (this.state.currentTestIdx === db.length - 1) {
                         btnNext.innerHTML = 'Finish Exam <i class="fas fa-flag-checkered"></i>';
                         btnNext.onclick = () => this.finishExam();
                    } else {
                         btnNext.innerHTML = 'Next Test <i class="fas fa-arrow-right"></i>';
                         btnNext.onclick = () => this.nextTest();
                    }
                } else {
                    btnCheck.classList.remove('hidden');
                    btnNext.classList.add('hidden');
                }
            },

            renderOptions(test) {
                const container = document.getElementById('options-container');
                container.innerHTML = '';

                test.options.forEach(opt => {
                    const isUsed = Object.entries(this.state.userAnswers).some(([k, v]) => k.startsWith(test.id) && v === opt.id);
                    
                    const div = document.createElement('div');
                    div.className = `draggable-item bg-white border border-slate-200 p-3 rounded-lg shadow-sm hover:shadow-md transition-all text-sm ${isUsed ? 'used' : ''}`;
                    if (!isUsed && !this.state.testCompleted) {
                        div.draggable = true;
                        div.ondragstart = (e) => this.drag(e, opt.id, opt.text);
                        div.ontouchstart = (e) => this.touchStart(e, opt.id, opt.text);
                    }
                    div.innerHTML = `<span class="font-bold text-rose-600 mr-2">[${opt.id}]</span> ${opt.text}`;
                    container.appendChild(div);
                });
            },

            drag(ev, optId, optText) {
                this.state.draggedId = { id: optId, text: optText };
                ev.dataTransfer.setData("text", JSON.stringify({id: optId, text: optText}));
            },
            
            allowDrop(ev) { ev.preventDefault(); ev.target.classList.add('hovered'); },
            
            drop(ev) {
                ev.preventDefault();
                const target = ev.target.closest('.drop-zone');
                if (!target) return;
                target.classList.remove('hovered');
                
                let data = this.state.draggedId;
                if (!data && ev.dataTransfer) {
                     try { data = JSON.parse(ev.dataTransfer.getData("text")); } catch(e){}
                }
                
                if (data) {
                    const qId = target.getAttribute('data-id');
                    this.state.userAnswers[`${db[this.state.currentTestIdx].id}-${qId}`] = data.id;
                    this.renderTest();
                }
            },

            handleGapClick(testId, qId) {
                const key = `${testId}-${qId}`;
                if (this.state.userAnswers[key]) {
                    delete this.state.userAnswers[key];
                    this.renderTest();
                }
            },

            fillGapUI(gapEl, optId) {
                const test = db[this.state.currentTestIdx];
                const optText = test.options.find(o => o.id === optId)?.text || "";
                
                gapEl.className = 'drop-zone filled'; 
                gapEl.innerHTML = `<span class="uppercase text-rose-800 mr-1">[${optId}]</span><span class="font-extrabold">${optText}</span>`;
            },

            checkAnswers() {
                const test = db[this.state.currentTestIdx];
                let correctCount = 0;
                let answeredCount = 0;
                const totalQuestions = Object.keys(test.answers).length; 

                document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    if (this.state.userAnswers[`${test.id}-${qId}`]) answeredCount++;
                });

                if (answeredCount < totalQuestions) {
                    alert("Please fill all gaps before checking.");
                    return;
                }

                document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    const userAns = this.state.userAnswers[`${test.id}-${qId}`];
                    if (userAns && userAns === test.answers[qId]) correctCount++;
                });

                if (correctCount >= 4) {
                    this.showFeedback(true); // PASSED
                } else {
                    if (this.state.attemptsLeft > 0) {
                        this.state.attemptsLeft--;
                        alert(`Incorrect. You need at least 4 correct answers. You have ${this.state.attemptsLeft} attempt(s) left.`);
                        this.highlightErrorsOnly(); 
                    } else {
                        this.showFeedback(false); // FAILED
                    }
                }
            },

            highlightErrorsOnly() {
                 const test = db[this.state.currentTestIdx];
                 document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    const userAns = this.state.userAnswers[`${test.id}-${qId}`];
                    
                    gap.className = 'drop-zone filled'; // Reset
                    
                    if (userAns && userAns !== test.answers[qId]) {
                        gap.classList.add('wrong'); // Add Red style
                    }
                 });
            },

            showFeedback(passed) {
                this.state.testCompleted = true;
                this.state.testPassed = passed;
                
                const test = db[this.state.currentTestIdx];

                document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    const userAns = this.state.userAnswers[`${test.id}-${qId}`];
                    const correctAns = test.answers[qId];
                    
                    gap.className = 'drop-zone filled'; // Reset

                    if (passed) {
                        if (userAns === correctAns) {
                            gap.classList.add('correct'); // Green style
                        } else {
                            gap.classList.add('wrong'); // Red style
                        }
                    } else {
                        if (userAns !== correctAns) {
                            gap.classList.add('wrong');
                        }
                    }
                });

                if (passed) {
                    alert("Great job! You passed this test (>= 4 correct).");
                } else {
                    alert("Out of attempts. Moving to next part.");
                }

                this.renderTest(); 
            },

            nextTest() {
                this.state.currentTestIdx++;
                this.state.attemptsLeft = 2; 
                this.state.testCompleted = false;
                this.state.testPassed = false;
                this.renderTest();
            },

            finishExam() {
                const endTime = new Date();
                const diffMs = endTime - this.state.startTime;
                const minutes = Math.floor(diffMs / 60000);
                const seconds = Math.floor(((diffMs % 60000) / 1000));
                const durationStr = `${minutes} min ${seconds} sec`;

                let score = 0;
                let totalQ = 0;

                db.forEach(test => {
                    const qIds = Object.keys(test.answers);
                    totalQ += qIds.length;
                    
                    qIds.forEach(qId => {
                        const key = `${test.id}-${qId}`;
                        const userAns = this.state.userAnswers[key];
                        if (userAns === test.answers[qId]) score++;
                    });
                });

                const percent = totalQ > 0 ? Math.round((score / totalQ) * 100) : 0;

                guiKetQua10Cot(
                    "PET Reading Part 4 - Ready for PET Tests 1-4", 
                    this.state.studentId,
                    this.state.userName, 
                    score + "/" + totalQ,
                    percent + "%",
                    durationStr
                );

                document.getElementById('screen-app').classList.add('hidden');
                document.getElementById('screen-result').classList.remove('hidden');
                document.getElementById('result-score').textContent = score;
                document.getElementById('result-score').nextElementSibling.textContent = "/" + totalQ;
                document.getElementById('result-percent').textContent = `${percent}%`;
                document.getElementById('res-name').textContent = this.state.userName;
                document.getElementById('res-id').textContent = this.state.studentId;
                document.getElementById('res-time').textContent = durationStr;
            },

            touchStart(ev, optId, text) {
                this.state.draggedId = { id: optId, text: text };
                document.querySelectorAll('.drop-zone').forEach(el => el.style.borderColor = '#e11d48');
            }
        };
    </script>
</body>
</html>
