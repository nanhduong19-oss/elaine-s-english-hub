<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAMMAR REVISION - English Tenses</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; /* Prevent tap highlight on mobile */
        }
        
        /* Custom smooth scrollbar for overflow areas */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .bg-app {
            background-image: url('https://i.pinimg.com/474x/eb/8c/5e/eb8c5e1401e2ed03660381fc9077059c.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        .bg-app::before {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background-color: rgba(255, 255, 255, 0.6); /* Soft overlay to make text readable */
            z-index: 0;
        }

        .content-layer {
            position: relative;
            z-index: 10;
        }

        .option-label {
            transition: all 0.2s ease-in-out;
        }
        .option-label:hover {
            transform: translateX(5px);
        }
        
        /* Moodboard Custom Colors checked state */
        input[type="radio"]:checked + div {
            border-color: #8dc63f; /* Light Green */
            background-color: #f7fceb;
        }
        input[type="radio"]:checked + div span.letter-badge {
            background-color: #8dc63f;
            color: #ffffff;
        }
    </style>

    <!-- Script to prevent right-click and viewing source code -->
    <script>
        // Vô hiệu hóa chuột phải (Context Menu)
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // Vô hiệu hóa các phím tắt xem mã nguồn và DevTools
        document.addEventListener('keydown', function(e) {
            // F12
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
            }
            // Ctrl+Shift+I / Cmd+Option+I (Mở tab Elements)
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
                e.preventDefault();
            }
            // Ctrl+Shift+J / Cmd+Option+J (Mở tab Console)
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'J' || e.key === 'j')) {
                e.preventDefault();
            }
            // Ctrl+Shift+C / Cmd+Option+C (Kiểm tra phần tử)
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
                e.preventDefault();
            }
            // Ctrl+U / Cmd+U (Xem mã nguồn trang)
            if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u')) {
                e.preventDefault();
            }
        });
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Data containing 10 extracted questions with English explanations
        const INITIAL_QUESTIONS = [
            {
                id: 1,
                text: "Water _______ of hydrogen and oxygen.",
                options: [
                    { id: 'a', text: "is consisting" },
                    { id: 'b', text: "consists" },
                    { id: 'c', text: "has consisted" },
                    { id: 'd', text: "will consist" }
                ],
                correct: 'b',
                explanation: "Sự thật hiển nhiên (Nước bao gồm hydro và oxy) nên dùng thì Hiện tại đơn. Động từ 'consist' (bao gồm) không dùng ở thì tiếp diễn."
            },
            {
                id: 2,
                text: "Don't give the chocolate to Helen. She _______ it.",
                options: [
                    { id: 'a', text: "hates" },
                    { id: 'b', text: "is hating" },
                    { id: 'c', text: "has hated" },
                    { id: 'd', text: "hated" }
                ],
                correct: 'a',
                explanation: "Động từ chỉ cảm xúc 'hate' (ghét) không dùng ở thì tiếp diễn. Diễn tả sở thích/cảm xúc chung ở hiện tại dùng Hiện tại đơn."
            },
            {
                id: 3,
                text: "The Sun _______ us heat and light.",
                options: [
                    { id: 'a', text: "will give" },
                    { id: 'b', text: "is giving" },
                    { id: 'c', text: "gives" },
                    { id: 'd', text: "has given" }
                ],
                correct: 'c',
                explanation: "Sự thật hiển nhiên (Mặt trời cung cấp nhiệt và ánh sáng) nên dùng thì Hiện tại đơn."
            },
            {
                id: 4,
                text: "We _______ students, so we _______ to school on weekdays.",
                options: [
                    { id: 'a', text: "are / go often" },
                    { id: 'b', text: "are / often go" },
                    { id: 'c', text: "are / have often gone" },
                    { id: 'd', text: "have been / are often going" }
                ],
                correct: 'b',
                explanation: "Trạng từ chỉ tần suất 'often' đứng trước động từ thường (go). Diễn tả sự thật và thói quen dùng Hiện tại đơn."
            },
            {
                id: 5,
                text: "Every day, Peter _______ at 7 o'clock, _______ breakfast, and then _______ to work at 7.30.",
                options: [
                    { id: 'a', text: "has often got / will have / go" },
                    { id: 'b', text: "often gets up / has / goes" },
                    { id: 'c', text: "is often getting / having / goes" },
                    { id: 'd', text: "has often got up / had / went" }
                ],
                correct: 'b',
                explanation: "Dấu hiệu 'Every day' (mỗi ngày) chỉ thói quen lặp đi lặp lại. Chuỗi hành động liên tiếp trong hiện tại đều dùng thì Hiện tại đơn."
            },
            {
                id: 6,
                text: "California _______ in the United Kingdom. It _______ in the US.",
                options: [
                    { id: 'a', text: "is not / is" },
                    { id: 'b', text: "has not been / is" },
                    { id: 'c', text: "will not be / will be" },
                    { id: 'd', text: "was not / has been" }
                ],
                correct: 'a',
                explanation: "Diễn tả sự thật về vị trí địa lý, dùng thì Hiện tại đơn với động từ 'to be'."
            },
            {
                id: 7,
                text: "Cats _______ milk, but birds _______.",
                options: [
                    { id: 'a', text: "like / do not" },
                    { id: 'b', text: "have liked / have not" },
                    { id: 'c', text: "are liking / are not" },
                    { id: 'd', text: "were liking / were not" }
                ],
                correct: 'a',
                explanation: "Động từ 'like' không dùng thì tiếp diễn. Diễn tả đặc tính chung dùng thì Hiện tại đơn. Phủ định mượn trợ động từ 'do not'."
            },
            {
                id: 8,
                text: "Every day, Sarah _______ her children to school and then _______ home to prepare lunch.",
                options: [
                    { id: 'a', text: "is taking / returning" },
                    { id: 'b', text: "takes / returns" },
                    { id: 'c', text: "has taken / returned" },
                    { id: 'd', text: "will take / will return" }
                ],
                correct: 'b',
                explanation: "Dấu hiệu 'Every day' và chuỗi hành động liên tiếp dùng thì Hiện tại đơn (chia số ít theo chủ ngữ Sarah)."
            },
            {
                id: 9,
                text: "The sun _______ the ball of fire in the sky that the Earth _______ round.",
                options: [
                    { id: 'a', text: "will be / has gone" },
                    { id: 'b', text: "will be / will be going" },
                    { id: 'c', text: "is / goes" },
                    { id: 'd', text: "has been / is going" }
                ],
                correct: 'c',
                explanation: "Sự thật hiển nhiên trong vũ trụ luôn được chia ở thì Hiện tại đơn."

            {
                id: 10,
                text: "Sally _______ really hard for her exams this week.",
                options: [
                    { id: 'a', text: "takes" },
                    { id: 'b', text: "will be taking" },
                    { id: 'c', text: "is taking" },
                    { id: 'd', text: "had taken" }

                correct: 'c',
                explanation: "Dấu hiệu 'this week' (tuần này) kết hợp ngữ cảnh sự việc diễn ra tạm thời xung quanh thời điểm nói, dùng Hiện tại tiếp diễn."
            },
            {
                id: 11,
                text: "Many people ______ living in Seattle because it ______ continually.",

                    { id: "b", text: "have hated / will often rain" },
                    { id: "c", text: "hate / often rains" },
                    { id: "d", text: "hated / was often raining" }
                ],
                correct: "c",
                explanation: "Dùng thì Hiện tại đơn để diễn tả một sự thật/trạng thái (hate) và một thói quen/sự việc lặp lại (often rains)."
            },
            {
                id: 12,
                text: "The sun ______ in the East and ______ in the West.",
                options: [
                    { id: "a", text: "rises / sets" },
                    { id: "b", text: "is rising / is setting" },
                    { id: "c", text: "has risen / has set" },
                    { id: "d", text: "will rise / will set" }

                correct: "a",
                explanation: "Diễn tả một chân lý, sự thật hiển nhiên nên dùng thì Hiện tại đơn."
            },
            {
                id: 13,
                text: "______ on the computer now?",

                    { id: "a", text: "Is Peter working" },
                    { id: "b", text: "Was Peter working" },
                    { id: "c", "text": "Has Peter worked" },
                    { id: "d", text: "Will Peter be working" }

            {

            },
            {
                id: 15,
                text: "Right now, Long ______ with his friends. They ______ the differences between British English and American English.",

                    { id: "a", text: "sits / discuss" },
                    { id: "b", text: "has been sitting / will discuss" },
                    { id: "c", text: "was sitting / was discussing" },
                    { id: "d", text: "is sitting / are discussing" }

                correct: "d",
                explanation: "Dấu hiệu 'Right now' dùng Hiện tại tiếp diễn cho cả hai vế."
            },
            {
                id: 16,
                text: "– ______ free this afternoon?\n– No, I ______.\n– What ______?\n– I ______ my dentist.",

                correct: "d",
                explanation: "Dùng Hiện tại tiếp diễn để chỉ một kế hoạch/sự sắp xếp chắc chắn trong tương lai gần."
            },
            {
                id: 17,
                text: "Listen! Someone ______ at the door. I ______ it.",

                    { id: "c", text: "was knocking / answered" },
                    { id: "d", text: "is knocking / will answer" }

                explanation: "Vế đầu dùng Hiện tại tiếp diễn (Listen!). Vế sau dùng tương lai đơn cho một quyết định tức thời."
            },
            {
                id: 18,
                text: "Every day, John ______ rice and vegetables for lunch, but today he ______ chicken soup and roast beef. Today is his brother’s wedding.",

                    { id: "a", text: "has / is having" },

                    { id: "c", text: "is having / has" },
                    { id: "d", text: "has had / has" }

                explanation: "Vế đầu là thói quen hàng ngày (Hiện tại đơn), vế sau là sự việc tạm thời xảy ra hôm nay (Hiện tại tiếp diễn)."
            },
            {
                id: 19,
                text: "It ______, so we can’t go to the beach.",

                    { id: "a", text: "had rained" },

                    { id: "d", text: "will have rained" }

            {
                id: 20,

                    { id: "d", text: "had wanted / was working" }

                correct: "b",
                explanation: "'Want' là động từ trạng thái không dùng tiếp diễn. Vế sau dùng tiếp diễn để chỉ quá trình đang làm việc."
            },
            {

                    { id: "a", text: "visited" },
                    { id: "b", text: "have visited" },

                    { id: "d", text: "will visit" }
                ],
                correct: "b",
                explanation: "Dấu hiệu 'Since + mốc thời gian' dùng thì Hiện tại hoàn thành."
            },
            {
                id: 22,

                correct: "a",
                explanation: "Kết hợp giữa thói quen (Hiện tại đơn) và sự việc tạm thời hôm nay (Hiện tại tiếp diễn)."
            },
            {
                id: 23,

                correct: "c",

            {

                return d.toLocaleTimeString('en-US') + ' | ' + d.toLocaleDateString('en-US');

                        message: '🎉 Correct Answer!',

                                    {/* Feedback Overlay Modal */}
                                    {feedback.show && (
                                        <div className="absolute inset-0 bg-white/95 backdrop-blur-md z-10 flex flex-col p-4 sm:p-6 animate-[fadeIn_0.3s_ease-out]">
                                            <div className="w-full h-full max-w-xl mx-auto flex flex-col">
                                                <div className="flex-1 overflow-y-auto flex flex-col justify-center pb-4">
                                                    {feedback.type === 'success' && (
                                                        <div className="mb-3 sm:mb-4 flex justify-center shrink-0">
                                                            <div className="w-14 h-14 sm:w-20 sm:h-20 rounded-full flex items-center justify-center bg-green-100">
                                                                <svg className="w-8 h-8 sm:w-10 sm:h-10" style={{color: COLORS.darkGreen}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>
                                                            </div>
                                                        </div>
                                                    )}
                                                    {feedback.type === 'warning' && (
                                                        <div className="mb-3 sm:mb-4 flex justify-center shrink-0">
                                                            <div className="w-14 h-14 sm:w-20 sm:h-20 rounded-full flex items-center justify-center bg-yellow-100">
                                                                <svg className="w-8 h-8 sm:w-10 sm:h-10" style={{color: COLORS.orangeYellow}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                                                            </div>
                                                        </div>
                                                    )}
                                                    {feedback.type === 'error' && (
                                                        <div className="mb-3 sm:mb-4 flex justify-center shrink-0">
                                                            <div className="w-14 h-14 sm:w-20 sm:h-20 rounded-full flex items-center justify-center bg-red-100">
                                                                <svg className="w-8 h-8 sm:w-10 sm:h-10" style={{color: COLORS.orange}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M6 18L18 6M6 6l12 12" /></svg>
                                                            </div>
                                                        </div>
                                                    )}

                                                    <h3 className="text-lg sm:text-2xl font-extrabold mb-3 sm:mb-6 text-center shrink-0" style={{
                                                        color: feedback.type === 'success' ? COLORS.darkGreen : 
                                                               feedback.type === 'warning' ? COLORS.orangeYellow : COLORS.orange
                                                    }}>
                                                        {feedback.message}
                                                    </h3>

                                                    {(feedback.type === 'error' || feedback.type === 'success') && (
                                                        <div className="bg-gray-50 p-4 sm:p-6 rounded-2xl border border-gray-200 text-left shrink-0 shadow-inner">
                                                            <p className="text-gray-500 text-[10px] sm:text-xs uppercase font-extrabold tracking-wider mb-1 sm:mb-2">Correct Answer:</p>
                                                            <p className="font-bold text-base sm:text-xl mb-3 sm:mb-4" style={{color: COLORS.darkGreen}}>{feedback.correctAnswer}</p>
                                                            
                                                            <p className="text-gray-500 text-[10px] sm:text-xs uppercase font-extrabold tracking-wider mb-1 sm:mb-2">Explanation:</p>
                                                            <p className="text-gray-800 text-sm sm:text-lg leading-relaxed">{feedback.explanation}</p>
                                                        </div>
                                                    )}
                                                </div>
                                                <button 
                                                    onClick={handleNextQuestion}
                                                    className="w-full text-white font-bold py-3 sm:py-4 px-6 rounded-xl transition-all shadow-lg hover:opacity-90 shrink-0"
                                                    style={{backgroundColor: COLORS.darkGreen}}
                                                >
                                                    Continue
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* RESULT SCREEN */}
                        {step === 'result' && (
                            <div className="flex-1 flex items-center justify-center p-4 min-h-0 overflow-y-auto">
                                <div className="bg-white/95 backdrop-blur p-6 sm:p-8 rounded-3xl shadow-2xl w-full max-w-lg border-t-8 shrink-0 my-auto" style={{borderColor: COLORS.lightGreen}}>
                                    <div className="text-center">
                                        <div className="inline-flex items-center justify-center w-20 h-20 sm:w-24 sm:h-24 rounded-full mb-4 sm:mb-6" style={{backgroundColor: '#f7fceb'}}>
                                            <svg className="w-10 h-10 sm:w-12 sm:h-12" style={{color: COLORS.lightGreen}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                        </div>
                                        <h1 className="text-2xl sm:text-3xl font-extrabold text-gray-800 mb-2">Quiz Completed!</h1>
                                        <p className="text-gray-500 mb-6 sm:mb-8 font-medium text-sm sm:text-base">Congratulations on completing the revision.</p>
                                        
                                        <div className="rounded-2xl p-4 sm:p-6 mb-4 sm:mb-6 border" style={{backgroundColor: '#fafafa', borderColor: '#e5e7eb'}}>
                                            <div className="grid grid-cols-2 gap-y-3 sm:gap-y-4 text-left">
                                                <div className="text-xs sm:text-sm font-bold text-gray-500 uppercase tracking-wide">Student ID</div>
                                                <div className="font-bold text-gray-800 text-right text-sm sm:text-base">{studentInfo.id}</div>
                                                
                                                <div className="text-xs sm:text-sm font-bold text-gray-500 uppercase tracking-wide">Full Name</div>
                                                <div className="font-bold text-gray-800 text-right text-sm sm:text-base">{studentInfo.name}</div>
                                                
                                                <div className="col-span-2 border-t border-gray-200 my-1 sm:my-2"></div>
                                                
                                                <div className="text-xs sm:text-sm font-bold text-gray-500 uppercase tracking-wide flex items-center">
                                                    First Try Accuracy
                                                </div>
                                                <div className="font-black text-xl sm:text-2xl text-right flex items-center justify-end" style={{color: COLORS.darkGreen}}>
                                                    {percentage}% <span className="text-xs sm:text-sm font-normal text-gray-500 ml-1 sm:ml-2">({stats.correctFirstTry}/{totalInitialQuestions})</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-gray-50 rounded-2xl p-4 sm:p-6 text-sm grid grid-cols-1 gap-3 sm:gap-4 text-left border border-gray-100">
                                            <div className="flex justify-between items-center">
                                                <span className="text-gray-500 font-bold uppercase tracking-wider text-[10px] sm:text-xs">Start</span>
                                                <span className="text-gray-800 font-mono font-medium text-[10px] sm:text-sm">{formatDate(times.start)}</span>
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <span className="text-gray-500 font-bold uppercase tracking-wider text-[10px] sm:text-xs">End</span>
                                                <span className="text-gray-800 font-mono font-medium text-[10px] sm:text-sm">{formatDate(times.end)}</span>
                                            </div>
                                            <div className="flex justify-between items-center bg-white p-3 sm:p-4 rounded-xl border border-gray-200 mt-1 sm:mt-2 shadow-sm">
                                                <span className="text-gray-800 font-bold text-xs sm:text-sm">Total Time</span>
                                                <span className="font-black text-base sm:text-lg" style={{color: COLORS.orange}}>{calculateDuration(times.start, times.end)}</span>
                                            </div>
                                        </div>
                                        
                                        <button 
                                            onClick={() => window.location.reload()}
                                            className="mt-6 bg-white border-2 hover:bg-gray-50 text-gray-700 font-bold py-3 sm:py-4 px-8 rounded-xl transition-all w-full shadow-sm text-sm sm:text-base"
                                            style={{borderColor: COLORS.orangeYellow}}
                                        >
                                            Restart Quiz
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* FOOTER */}
                    <footer className="relative z-10 shrink-0 py-2 sm:py-3 px-4 text-center bg-white/60 backdrop-blur-md border-t border-white/50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                        <p className="font-bold text-slate-600 text-[11px] sm:text-[13px] mb-0.5">Compiled and Digitized by Elaine Nguyễn</p>
                        <p className="italic text-slate-500 text-[10px] sm:text-xs">Empowering students through knowledge and technology</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
