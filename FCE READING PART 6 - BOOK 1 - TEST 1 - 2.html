<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCE Reading Part 6 - Drag & Drop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Drag & Drop Styles */
        .drop-zone {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: auto;
            min-width: 45px;
            height: 28px;
            margin: 0 4px;
            background-color: #f0fdf4;
            border: 2px dashed #86efac;
            border-radius: 6px;
            transition: all 0.2s ease;
            color: #166534;
            font-weight: 700;
            font-size: 0.85em;
            padding: 0 6px;
            vertical-align: middle;
            cursor: pointer;
        }

        .drop-zone.hovered {
            background-color: #dcfce7;
            border-color: #16a34a;
            transform: scale(1.1);
        }

        .drop-zone.filled {
            display: inline; 
            width: auto;
            height: auto;
            margin: 0 2px;
            padding: 2px 6px;
            background-color: #f8fafc; 
            border: none;
            border-bottom: 2px solid #64748b;
            border-radius: 4px;
            color: #0f172a;
            font-size: 1em;
            font-weight: 800;
            text-align: left;
            box-shadow: none;
            white-space: normal; 
            line-height: 1.6;
        }
        
        .drop-zone.filled:hover {
            background-color: #e2e8f0;
            border-bottom-color: #0f172a; 
        }
        
        .drop-zone.filled:hover::after {
            content: ' ✕';
            font-size: 0.8em;
            color: #ef4444;
            font-weight: bold;
            margin-left: 4px;
        }

        .drop-zone.correct {
            background-color: #dcfce7 !important;
            border-bottom: 2px solid #16a34a !important;
            color: #15803d !important;
            pointer-events: none;
        }
        
        .drop-zone.wrong {
            background-color: #fee2e2 !important;
            border-bottom: 2px solid #dc2626 !important;
            color: #b91c1c !important;
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        .draggable-item {
            cursor: grab;
            user-select: none;
            touch-action: none;
        }
        .draggable-item:active { cursor: grabbing; }
        
        .draggable-item.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }

        .draggable-item.used {
            opacity: 0.3;
            pointer-events: none;
            background-color: #f1f5f9;
            filter: grayscale(100%);
            border-style: dashed;
        }

        .reading-content p { 
            margin-bottom: 1.5em; 
            line-height: 2.0; 
            text-align: justify; 
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        #questions-container { overflow-anchor: none !important; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col text-slate-800 overflow-hidden">

    <!-- SCREEN 1: WELCOME -->

    <!-- SCREEN 2: MAIN APP -->
    <div id="screen-app" class="hidden flex-col h-full">
        <!-- Header -->
        <header class="bg-white border-b border-slate-200 h-16 flex-none z-20">
            <div class="h-full max-w-[1920px] mx-auto px-6 flex justify-between items-center">

                    <div class="px-3 py-1 bg-green-50 border border-green-200 rounded-lg text-green-700 font-mono font-bold text-sm flex items-center gap-2">
                        <i class="far fa-clock"></i> <span id="timer-display">00:00:00</span>
                    </div>

                     <div class="text-right hidden md:block">

        <!-- Main Content (Split View) -->
        <main class="flex-grow flex overflow-hidden bg-slate-100 relative">
            <div class="w-full h-full flex flex-col lg:flex-row">
                
                <!-- LEFT: TEXT (65%) -->
                <div class="w-full lg:w-[65%] h-1/2 lg:h-full bg-white border-r border-slate-200 overflow-y-auto custom-scrollbar p-6 lg:p-10 relative">
                    <div class="max-w-4xl mx-auto pb-20">
                        <h3 class="font-bold text-slate-400 text-xs uppercase tracking-wider mb-2">Reading Article</h3>
                        <h2 id="text-title" class="text-2xl font-extrabold text-slate-800 mb-6">Article Title</h2>
                        <div id="reading-content" class="reading-content text-lg text-slate-700 font-normal leading-loose">
                            <!-- Content Injected Here -->
                        </div>
                        
                        <!-- Explanation Box (Hidden initially) -->
                        <div id="explanation-box" class="hidden mt-8 p-6 bg-green-50 rounded-xl border border-green-200">
                            <h4 class="font-bold text-green-800 mb-4 flex items-center gap-2"><i class="fas fa-lightbulb"></i> Explanations</h4>
                            <div id="explanation-content" class="space-y-3 text-sm text-green-900"></div>
                        </div>

                </div>

                <!-- RIGHT: OPTIONS (35%) -->
                <div class="w-full lg:w-[35%] h-1/2 lg:h-full bg-slate-50 flex flex-col border-t lg:border-t-0 border-slate-200 shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)] z-10">
                    <div class="p-4 bg-white border-b border-slate-200 shadow-sm flex-none flex justify-between items-center">
                        <h3 class="font-bold text-green-700 flex items-center gap-2 text-sm uppercase tracking-wider">
                            <i class="fas fa-list-ul"></i> Sentences A-G
                        </h3>
                        <div id="attempts-display" class="text-xs font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded">
                            Attempts left: 2
                        </div>
                    </div>
                    <div id="options-container" class="flex-grow overflow-y-auto custom-scrollbar p-4 space-y-3 pb-20">
                        <!-- Draggable Options Injected Here -->
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- SCREEN 3: RESULT -->
    <div id="screen-result" class="hidden fixed inset-0 z-50 bg-slate-50 overflow-y-auto custom-scrollbar">
        <div class="min-h-screen w-full flex items-start justify-center p-6 md:py-12">
            <div class="max-w-2xl w-full flex flex-col gap-6">
                <div class="text-center mb-2">
                    <h1 class="text-4xl font-extrabold text-slate-800">Final Results</h1>
                    <div id="result-status-msg" class="flex items-center justify-center gap-2 mt-3 font-bold text-lg"></div>
                </div>
                <div class="bg-white rounded-2xl p-8 border border-slate-200 shadow-sm text-center">

                    <div class="text-5xl font-extrabold text-green-600 mb-2">

                    </div>
                    <div id="result-percent" class="text-slate-500 font-medium mb-6">0%</div>

                         <span>Candidate: <span id="res-name"></span> (<span id="res-id"></span>)</span>
                         <span>Time: <span id="res-time"></span></span>
                    </div>
                    
                    <div id="sheet-status" class="mt-4 text-sm font-medium text-slate-400">
                        Waiting to send...
                    </div>

                <button onclick="location.reload()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl">Practice Again</button>
            </div>

    <script>
        // --- DATA ---
        const db = [
            {
                id: "test1",
                title: "Blind Runner",
                content_html: `
                    <p><em>Paul Hardy reports on a blind runner called Simon Wheatcroft who enjoys taking part in marathon and ultra-marathon races, running distances between 42 km and 160 km.</em></p>
                    <p>Running marathons, a race of 42 km, has become increasingly popular. This distance poses extreme physical and mental challenges for anyone, but for Simon Wheatcroft there is another hurdle; he has been blind since he was 18 years old.</p>
                    <p>For the past two years Simon, now 29, has been overcoming his disability to compete in marathons and ultra-marathons by training with runners who act as his guides, and also, rather uniquely, by teaching himself to run solo, out on the streets. ‘I got bored exercising indoors, so thought, “I’ll have a go at running outside”,’ he explains. <span class="drop-zone" data-id="37">[37]</span> Then he got bored again and wanted to try running on the roads.</p>
                    <p>Weeks of gradual exploration followed, walking a route alone. <span class="drop-zone" data-id="38">[38]</span> It took him along little-used pavements alongside a busy main road. He also recruited technology to help him his mental map of the area using a smartphone app, to provide feedback through headphones about his pace and distance. This information could then be cross-referenced with his knowledge of the route and any obstacles.</p>
                    <p>Now, having covered hundreds of km alone on the route, Simon has been able, gradually, to phase out the app. ‘When I first started I had to really concentrate to an unbelievable level to know where my feet were falling. Now it has become quite automated. <span class="drop-zone" data-id="39">[39]</span> I did make a few mistakes early on – like running into posts. But you only run into a post once before you think “Right, I’m going to remember where that is next time”,’ he laughs.</p>
                    <p>Joining Simon for a training session, it’s striking how natural and fluid his movements is; he takes shorter, shallower, more gentle steps than most runners, using his feet to feel his way. His landmarks are minute changes in gradient and slight variations in the running surface. <span class="drop-zone" data-id="40">[40]</span> ‘I have to believe the route is going to stay consistent, and there won’t be things like roadwork signs or big rocks,’ he says.</p>
                    <p><span class="drop-zone" data-id="41">[41]</span> ‘I try to concentrate on the millions of footsteps that go right and think positively,’ he explains. When it comes to racing in ultra-distance events, Simon has to use guides to run sections of the course with him; after all, it would be almost impossible to memorise a 150 km stretch of countryside by heart. However, the physical and practical advantages of training in the fresh air, on his own terms, are vast and have boosted his confidence in his running ability as well as providing inspiration to others.</p>
                    <p>But for Simon the real thrill and motivation for training come from simply being able to compete on equal terms. <span class="drop-zone" data-id="42">[42]</span> ‘I can’t hide the fact I’m blind,’ he says, ‘but at the same time I would rather compete with everybody else and not be put into a special group. Being visually impaired doesn’t mean you can’t run.’</p>
                `,
                options: [
                    { id: "A", text: "These provide the familiarity and consistency essential for the blind runner." },
                    { id: "B", text: "Their support gave him extra confidence regarding his changing surroundings." },
                    { id: "C", text: "Simon believes the feelings of liberation and independence he gets from running solo far outweigh any anxiety over such dangers." },
                    { id: "D", text: "He began by training on football pitches behind his house, running between the goalposts." },
                    { id: "E", text: "It gives him a great opportunity to run with everyone." },
                    { id: "F", text: "That’s not to say the learning curve has been without incident." },
                    { id: "G", text: "As a result of this slow experimentation, he was able to memorise a set five-kilometre course." }
                ],
                answers: { 37: "D", 38: "G", 39: "F", 40: "A", 41: "C", 42: "E" },
                explanations: `
                    <strong>37. D:</strong> Trước gap: 'I’ll have a go at running outside...'. Sau gap: 'Then he got bored again and wanted to try running on the roads.' D: 'He began by training on football pitches...' rất logic: bắt đầu ở nơi an toàn rồi mới ra đường.<br>
                    <strong>38. G:</strong> Trước gap: 'Weeks of gradual exploration followed...'. G: 'As a result of this slow experimentation, he was able to memorise a set five-kilometre course' giải thích kết quả của việc khám phá.<br>
                    <strong>39. F:</strong> Trước gap: 'Now it has become quite automated'. F: 'That’s not to say the learning curve has been without incident' chuyển ý sang việc gặp tai nạn (mistakes) ở câu sau.<br>
                    <strong>40. A:</strong> Trước gap nói về 'minute changes in gradient and slight variations...'. A: 'These provide the familiarity and consistency...' ám chỉ landmarks đó quan trọng thế nào.<br>
                    <strong>41. C:</strong> Sau đoạn nói về rủi ro. C: 'Simon believes the feelings of liberation... outweigh any anxiety...' giải thích lý do anh vẫn tiếp tục chạy một mình.<br>
                    <strong>42. E:</strong> Trước gap: 'compete on equal terms'. E: 'It gives him a great opportunity to run with everyone' làm rõ ý 'equal terms'.
                `
            },
            {
                id: "test2",
                title: "The sign on a hill",
                content_html: `
                    <p>At the top of a hill called Mount Lee in Los Angeles on the west coast of the USA is a very famous sign, recognisable to people around the world. My job is to look after this sign. It says Hollywood and that’s of course the place where films have been made for over a hundred years. The first film was made there in 1907 and by 1912, at least 15 independent studios could be found making films around town.</p>
                    <p>The film industry continued to grow and the name Hollywood, which by the 1920s represented not just a city but also an industry and a lifestyle, was made official when the ‘Hollywoodland’ sign was erected in 1923. It was only supposed to last about a year. <span class="drop-zone" data-id="37">[37]</span> But it wasn’t always. It started out as a massive billboard advertising an upscale suburban development called Hollywoodland.</p>
                    <p>In the 1940s, TV started to become popular and some Hollywood film studios closed, but then TV companies moved in and took them over. At this point, the city of Los Angeles decided to renovate the sign. The letters spelling ‘land’ were removed and the rest was repaired. Modern Hollywood was born. The letters in the sign weren’t straight and still aren’t. <span class="drop-zone" data-id="38">[38]</span> They follow the shape of Mount Lee and this is part of their fame.</p>
                    <p>I am responsible for maintaining and protecting the sign. <span class="drop-zone" data-id="39">[39]</span> When I first arrived in 1989, security was pretty low-tech – we put up a fence around the sign to stop trespassers messing with it. But people just jumped over the fence. The back of the sign was black with graffiti – there was barbed wire across it, but they still got through. So I decided to improve the effectiveness of the security.</p>
                    <p>Now we have motion-detectors and cameras. Everything goes via the internet to a dedicated surveillance team watching various structures around the city. <span class="drop-zone" data-id="40">[40]</span> But they can get a closer look on one of my regular tours.</p>
                    <p>It’s also important to protect the sign’s image as it’s used in loads of adverts and news pieces. There’s a simple rule about how the sign can be used. <span class="drop-zone" data-id="41">[41]</span> However, it mostly comes down to the look. To take a different example, if you used ‘Hollywood’ in the name of your company it would depend what the word looked like, whether it was just spelled out or whether the image of the sign itself was used.</p>
                    <p>People call up with the most ridiculous ideas. They want to light the sign, paint it pink, or cover it in something to promote their product. You’ll get a really enthusiastic marketing executive call up, terribly excited because they think they’re the first person to think of this or that idea. <span class="drop-zone" data-id="42">[42]</span> That’s because we don’t like to change the image and we hope it will have the same significance for generations to come.</p>
                `,
                options: [
                    { id: "A", text: "Even so, people still try to climb over the barrier, mostly innocent tourists surprised that you can’t walk right up to the sign." },
                    { id: "B", text: "They mostly get turned down." },
                    { id: "C", text: "If one of them ever fell down I would have to put it back up at exactly the same angle." },
                    { id: "D", text: "We used to have real problems." },
                    { id: "E", text: "Things have changed a lot since then." },
                    { id: "F", text: "It’s still there, of course, and is a symbol of the entertainment world." },
                    { id: "G", text: "If the purpose is commercial – to promote something – payment has to be made." }
                ],
                answers: { 37: "F", 38: "C", 39: "D", 40: "A", 41: "G", 42: "B" },
                explanations: `
                    <strong>37. F:</strong> Câu trước: 'only supposed to last'. Câu sau: 'But it wasn’t always'. F: 'It’s still there, of course...' tạo sự tương phản cần thiết.<br>
                    <strong>38. C:</strong> Trước gap: 'weren’t straight'. Sau gap: 'They follow the shape of Mount Lee'. C: 'If one of them ever fell down... put it back up at exactly the same angle' giải thích về góc nghiêng.<br>
                    <strong>39. D:</strong> Sau gap kể về quá khứ 1989. D: 'We used to have real problems' dẫn vào câu chuyện khó khăn trong quá khứ.<br>
                    <strong>40. A:</strong> Trước gap nói về an ninh hiện đại. A: 'Even so, people still try to climb over the barrier...' thể hiện sự tương phản (dù có an ninh vẫn có người trèo).<br>
                    <strong>41. G:</strong> Trước gap nói có 'simple rule'. G: 'If the purpose is commercial... payment has to be made' là ví dụ cụ thể cho luật đó.<br>
                    <strong>42. B:</strong> Trước gap kể về 'ridiculous ideas'. B: 'They mostly get turned down' là kết quả của việc đề xuất ý tưởng ngớ ngẩn.
                `
            }
        ];

        // --- 1. BIẾN LƯU THỜI GIAN BẮT ĐẦU ---
        var thoiGianBatDau = new Date();

        // --- 2. HÀM GỬI KẾT QUẢ ---
        function guiKetQua10Cot(tenBai, maHS, tenHS, diemSo, phanTram, thoiGianLamBai) {
            
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQHdZDP0xL5F0rCSlQMRRnEq-xbFDFRfeWfQy95FXXFsDiJ66CyOqxrb0tLyvucEuEqw/exec"; 
            
            const statusEl = document.getElementById('sheet-status');
            if(statusEl) statusEl.textContent = "Đang gửi dữ liệu...";

            var gio = thoiGianBatDau.getHours();
            var phut = thoiGianBatDau.getMinutes();
            var giay = thoiGianBatDau.getSeconds();
            var gioBatDauString = (gio < 10 ? '0'+gio : gio) + ":" + (phut < 10 ? '0'+phut : phut) + ":" + (giay < 10 ? '0'+giay : giay);

            var duLieu = {
                tenSheet: "Book 1 Reading Part 6 - Test 1 & 2", 
                tenBai: tenBai,            
                maHocSinh: maHS,
                hoTen: tenHS,
                gioBatDau: gioBatDauString,
                thoiGianLam: thoiGianLamBai, 
                soCauDung: diemSo,         
                phanTram: phanTram         
            };

            console.log("Đang gửi...", duLieu);

            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(duLieu)
            }).then(() => {
                if(statusEl) statusEl.innerHTML = '<span class="text-green-600"><i class="fas fa-check-circle"></i> Kết quả đã được lưu thành công!</span>';
                alert("✅ Submission Successful!");
            }).catch(err => {
                console.error(err);
                if(statusEl) statusEl.innerHTML = '<span class="text-red-500">Submission failed</span>';
                alert("❌ Submission failed");
            });
        }

        // --- APP LOGIC ---
        const app = {
            state: {
                currentTestIdx: 0,
                userName: "Student",
                studentId: "",
                startTime: null,
                userAnswers: {}, 
                draggedId: null,
                attemptsLeft: 2, 
                testCompleted: false,
                testPassed: false // Thêm trạng thái Đậu/Rớt
            },

            startExam() {
                const name = document.getElementById('user-name-input').value.trim();
                const id = document.getElementById('user-id-input').value.trim();
                
                if (!name) { alert("Please enter your name!"); return; }
                
                thoiGianBatDau = new Date();
                
                this.state.userName = name;
                this.state.studentId = id;
                this.state.startTime = thoiGianBatDau; 
                
                document.getElementById('header-name').textContent = name;
                document.getElementById('screen-welcome').classList.add('hidden');
                document.getElementById('screen-app').classList.remove('hidden');
                document.getElementById('screen-app').classList.add('flex');
                
                this.startTimer();
                this.renderTest();
            },

            startTimer() {
                setInterval(() => {
                    const now = new Date();
                    const diff = now - this.state.startTime;
                    const d = new Date(diff);
                    document.getElementById('timer-display').textContent = d.toISOString().substr(11, 8);
                }, 1000);
            },

            renderTest() {
                const test = db[this.state.currentTestIdx];
                
                document.getElementById('text-title').textContent = test.title;
                document.getElementById('header-title').textContent = `Test ${this.state.currentTestIdx + 1}`;
                document.getElementById('header-progress').textContent = `${this.state.currentTestIdx + 1}/${db.length}`;
                
                // --- LOGIC HIỂN THỊ EXPLANATION ---
                const expBox = document.getElementById('explanation-box');
                const expContent = document.getElementById('explanation-content');
                
                // Chỉ hiện giải thích khi đã hoàn thành VÀ ĐÃ ĐẬU
                if (this.state.testCompleted && this.state.testPassed) {
                    expBox.classList.remove('hidden');
                    expContent.innerHTML = test.explanations;
                } else {
                    expBox.classList.add('hidden');
                    expContent.innerHTML = '';
                }
                
                document.getElementById('attempts-display').textContent = `Attempts left: ${this.state.attemptsLeft}`;

                // Render Content
                const contentDiv = document.getElementById('reading-content');
                if (contentDiv.innerHTML.trim() === "" || contentDiv.getAttribute('data-test-id') !== test.id) {
                     contentDiv.innerHTML = test.content_html;
                     contentDiv.setAttribute('data-test-id', test.id);
                }
                
                // Re-bind events and fill UI
                const gaps = contentDiv.querySelectorAll('.drop-zone');
                gaps.forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    const key = `${test.id}-${qId}`;
                    const savedAns = this.state.userAnswers[key];
                    
                    if (savedAns) {
                        this.fillGapUI(gap, savedAns);
                    } else {
                         gap.className = 'drop-zone';
                         gap.innerHTML = `[${qId}]`;
                         gap.ondragover = (e) => this.allowDrop(e);
                         gap.ondrop = (e) => this.drop(e);
                    }
                    
                    if (!this.state.testCompleted) {
                         gap.onclick = () => this.handleGapClick(test.id, qId);
                    } else {
                        gap.onclick = null;
                        gap.ondragover = null;
                        gap.ondrop = null;
                    }
                });

                this.renderOptions(test);

                const btnCheck = document.getElementById('btn-check');
                const btnNext = document.getElementById('btn-next');
                
                if (this.state.testCompleted) {
                    btnCheck.classList.add('hidden');
                    btnNext.classList.remove('hidden');
                    if (this.state.currentTestIdx === db.length - 1) {
                         btnNext.innerHTML = 'Finish Exam <i class="fas fa-flag-checkered"></i>';
                         btnNext.onclick = () => this.finishExam();
                    } else {
                         btnNext.innerHTML = 'Next Test <i class="fas fa-arrow-right"></i>';
                         btnNext.onclick = () => this.nextTest();
                    }
                } else {
                    btnCheck.classList.remove('hidden');
                    btnNext.classList.add('hidden');
                }
            },

            renderOptions(test) {
                const container = document.getElementById('options-container');
                container.innerHTML = '';

                test.options.forEach(opt => {
                    const isUsed = Object.entries(this.state.userAnswers).some(([k, v]) => k.startsWith(test.id) && v === opt.id);
                    
                    const div = document.createElement('div');
                    div.className = `draggable-item bg-white border border-slate-200 p-3 rounded-lg shadow-sm hover:shadow-md transition-all text-sm ${isUsed ? 'used' : ''}`;
                    if (!isUsed && !this.state.testCompleted) {
                        div.draggable = true;
                        div.ondragstart = (e) => this.drag(e, opt.id, opt.text);
                        div.ontouchstart = (e) => this.touchStart(e, opt.id, opt.text);
                    }
                    div.innerHTML = `<span class="font-bold text-green-600 mr-2">[${opt.id}]</span> ${opt.text}`;
                    
                    container.appendChild(div);
                });
            },

            // --- DRAG & DROP ---
            drag(ev, optId, optText) {
                this.state.draggedId = { id: optId, text: optText };
                ev.dataTransfer.setData("text", JSON.stringify({id: optId, text: optText}));
            },
            
            allowDrop(ev) { ev.preventDefault(); ev.target.classList.add('hovered'); },
            
            drop(ev) {
                ev.preventDefault();
                const target = ev.target.closest('.drop-zone');
                if (!target) return;
                
                target.classList.remove('hovered');
                target.classList.remove('wrong'); 
                
                let data = this.state.draggedId;
                if (!data && ev.dataTransfer) {
                     try { data = JSON.parse(ev.dataTransfer.getData("text")); } catch(e){}
                }
                
                if (data) {
                    const qId = target.getAttribute('data-id');
                    this.state.userAnswers[`${db[this.state.currentTestIdx].id}-${qId}`] = data.id;
                    this.renderTest();
                }
            },

            handleGapClick(testId, qId) {
                const key = `${testId}-${qId}`;
                if (this.state.userAnswers[key]) {
                    delete this.state.userAnswers[key];
                    this.renderTest();
                }
            },

            fillGapUI(gapEl, optId) {
                const test = db[this.state.currentTestIdx];
                const optText = test.options.find(o => o.id === optId)?.text || "";
                
                // Keep wrong status visible if exists
                if(!gapEl.classList.contains('wrong') && !gapEl.classList.contains('correct')){
                     gapEl.className = 'drop-zone filled';
                } else {
                     gapEl.classList.add('filled');
                }
                
                gapEl.innerHTML = `<span class="font-bold mr-2">[${optId}]</span>${optText}`;
            },

            // --- CHECK LOGIC (UPDATED) ---
            checkAnswers() {
                const test = db[this.state.currentTestIdx];
                let correctCount = 0;
                let answeredCount = 0;
                
                // Đếm số câu trả lời
                document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    if (this.state.userAnswers[`${test.id}-${qId}`]) answeredCount++;
                });

                if (answeredCount < 6) {
                    alert("Please fill all gaps before checking.");
                    return;
                }

                // Tính điểm
                document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    const userAns = this.state.userAnswers[`${test.id}-${qId}`];
                    if (userAns && userAns === test.answers[qId]) correctCount++;
                });

                // Xử lý điều kiện
                if (correctCount >= 4) {
                    // ĐẬU
                    this.showFeedback(true);
                } else {
                    // CHƯA ĐẠT
                    if (this.state.attemptsLeft > 0) {
                        this.state.attemptsLeft--;
                        alert(`Incorrect. You need at least 4 correct answers. You have ${this.state.attemptsLeft} attempt(s) left.`);
                        this.highlightErrors(); 
                        this.renderTest(); 
                    } else {
                        // HẾT LƯỢT VÀ RỚT -> showFeedback(false)
                        this.showFeedback(false);
                    }
                }
            },

            highlightErrors() {
                 const test = db[this.state.currentTestIdx];
                 document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    const userAns = this.state.userAnswers[`${test.id}-${qId}`];
                    if (userAns && userAns !== test.answers[qId]) {
                        gap.classList.add('wrong');
                    }
                 });
            },

            showFeedback(passed) {
                this.state.testCompleted = true;
                this.state.testPassed = passed; // Lưu trạng thái đậu/rớt
                
                const test = db[this.state.currentTestIdx];

                document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    const userAns = this.state.userAnswers[`${test.id}-${qId}`];
                    const correctAns = test.answers[qId];
                    
                    gap.classList.remove('wrong');
                    gap.classList.remove('filled');
                    
                    if (userAns === correctAns) {
                        // Câu đúng luôn hiện xanh
                        gap.classList.add('correct');
                        gap.innerHTML = `<span class="font-bold mr-2">[${correctAns}]</span>${test.options.find(o => o.id === correctAns).text}`;
                    } else {
                        // Câu sai: Tùy vào trạng thái Pass/Fail
                        gap.classList.add('wrong');
                        
                        // CHỈ HIỆN ĐÁP ÁN ĐÚNG NẾU ĐÃ PASS
                        if (passed) {
                            const correctOpt = test.options.find(o => o.id === correctAns);
                            gap.innerHTML += `<div class="text-xs text-green-700 mt-2 p-2 bg-green-50 rounded border border-green-200 font-normal"><i class="fas fa-check"></i> Correct: [${correctAns}] ${correctOpt.text}</div>`;
                        } else {
                            // Nếu Fail, chỉ giữ lại báo đỏ, không hiện text đáp án đúng
                        }
                    }
                });

                if (passed) {
                    alert("Great job! You passed this test (>= 4 correct).");
                } else {
                    alert("Out of attempts. You did not reach the required score (4/6). Answers will not be shown.");
                }

                this.renderTest(); // Render lại để cập nhật explanation box (ẩn/hiện)
            },

            nextTest() {
                this.state.currentTestIdx++;
                this.state.attemptsLeft = 2; 
                this.state.testCompleted = false;
                this.state.testPassed = false; // Reset trạng thái
                this.renderTest();
            },

            finishExam() {
                const endTime = new Date();
                const diffMs = endTime - this.state.startTime;
                const minutes = Math.floor(diffMs / 60000);
                const seconds = Math.floor(((diffMs % 60000) / 1000));
                const durationStr = `${minutes} min ${seconds} sec`;

                let score = 0;
                let totalQ = 0;

                db.forEach(test => {
                    for (let qId = 37; qId <= 42; qId++) {
                        totalQ++;
                        const key = `${test.id}-${qId}`;
                        const userAns = this.state.userAnswers[key] || "-";
                        const correctAns = test.answers[qId];
                        if (userAns === correctAns) {
                            score++;
                        }
                    }
                });

                const percent = Math.round((score / totalQ) * 100);

                guiKetQua10Cot(
                    "FCE Reading Part 6 - Test 1 & 2", 
                    this.state.studentId,
                    this.state.userName, 
                    score + "/" + totalQ,
                    percent + "%",
                    durationStr
                );

                document.getElementById('screen-app').classList.add('hidden');
                document.getElementById('screen-result').classList.remove('hidden');
                document.getElementById('result-score').textContent = score;
                document.getElementById('result-percent').textContent = `${percent}%`;
                document.getElementById('res-name').textContent = this.state.userName;
                document.getElementById('res-id').textContent = this.state.studentId;
                document.getElementById('res-time').textContent = durationStr;
            },

            touchStart(ev, optId, text) {
                this.state.draggedId = { id: optId, text: text };
                document.querySelectorAll('.drop-zone').forEach(el => el.style.borderColor = '#22c55e');
            }
        };
    </script>
</body>
</html>
