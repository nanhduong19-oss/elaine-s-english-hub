<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCE Reading Part 6 - Drag & Drop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Drag & Drop Styles */
        .drop-zone {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: auto;
            min-width: 45px;
            height: 28px;
            margin: 0 4px;
            background-color: #f0fdf4;
            border: 2px dashed #86efac;
            border-radius: 6px;
            transition: all 0.2s ease;
            color: #166534;
            font-weight: 700;
            font-size: 0.85em;
            padding: 0 6px;
            vertical-align: middle;
            cursor: pointer;
        }

        .drop-zone.hovered {
            background-color: #dcfce7;
            border-color: #16a34a;
            transform: scale(1.1);
        }

        .drop-zone.filled {
            display: inline; 
            width: auto;
            height: auto;
            margin: 0 2px;
            padding: 2px 6px;
            background-color: #f8fafc; 
            border: none;
            border-bottom: 2px solid #64748b;
            border-radius: 4px;
            color: #0f172a;
            font-size: 1em;
            font-weight: 800;
            text-align: left;
            box-shadow: none;
            white-space: normal; 
            line-height: 1.6;
        }
        
        .drop-zone.filled:hover {
            background-color: #e2e8f0;
            border-bottom-color: #0f172a; 
        }
        
        .drop-zone.filled:hover::after {
            content: ' ✕';
            font-size: 0.8em;
            color: #ef4444;
            font-weight: bold;
            margin-left: 4px;
        }

        .drop-zone.correct {
            background-color: #dcfce7 !important;
            border-bottom: 2px solid #16a34a !important;
            color: #15803d !important;
            pointer-events: none;
        }
        
        .drop-zone.wrong {
            background-color: #fee2e2 !important;
            border-bottom: 2px solid #dc2626 !important;
            color: #b91c1c !important;
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        .draggable-item {
            cursor: grab;
            user-select: none;
            touch-action: none;
        }
        .draggable-item:active { cursor: grabbing; }
        
        .draggable-item.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }

        .draggable-item.used {
            opacity: 0.3;
            pointer-events: none;
            background-color: #f1f5f9;
            filter: grayscale(100%);
            border-style: dashed;
        }

        .reading-content p { 
            margin-bottom: 1.5em; 
            line-height: 2.0; 
            text-align: justify; 
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        #questions-container { overflow-anchor: none !important; }
    </style>
</head>

                title: "Swimming with Manatees, Florida’s Gentle Giants",
                content_html: `
                    <p>When most people flock to the famous amusement parks in Orlando, Florida, they miss some of the natural wonders the State has to offer. It was in Citrus County on the beautiful west coast of Florida that we went to see the manatee, an amazing mammal that occupies coastal waters and rivers.</p>
                    <p>Our days started early in the morning at Homosassa Springs, as this is the perfect time to snorkel with the manatees before they get tired of visitors. We boarded a pontoon boat with Captain Traci Wood from Native Vacations. Having spotted two manatees just below the water, Captain Traci stopped the boat as the duo slowly glided towards us. <span class="drop-zone" data-id="37">[37]</span> Our boat was soon surrounded by other members of this gentle species.</p>
                    <p>Soon we resumed our journey. Within a few minutes Captain Traci stopped the boat again and we were given instructions. Whatever you do, she said, remember the three golden rules: minimize splash noise; act with very slow movements; and when you touch one of these friendly, gentle gray giants on the back or stomach, never touch with more than one hand at a time. The Endangered Species Act forbids touching a manatee unless it touches you first, and they will let you know. The protection of this endangered species is taken very seriously. For children, there is absolutely no chasing or riding the manatees. <span class="drop-zone" data-id="38">[38]</span> Most Homosassa manatees are very social and will come to you.</p>
                    <p>The next day, at Three Sisters Springs, we entered the water very slowly, trying to keep down the amount of thick, muddy sediment rising from the bottom of the river. <span class="drop-zone" data-id="39">[39]</span> This meant swimming with the manatees was not at all difficult or intimidating. We saw young children as well as seniors in the water and there was an abundance of energy and curiosity among us all.</p>
                    <p>Manatees are strictly herbivores, and they eat a great variety of species, including water hyacinth and water lettuce. They’re very big, measuring 3 to 5 meters and weighing as much as 1,600 kilos. <span class="drop-zone" data-id="40">[40]</span> Manatees are of course wild creatures, although when face to face with them, you’re unlikely to feel any fear.</p>
                    <p>Since not all visitors want to get nose-to-nose with the manatees, non-swimmers can also view them at Homosassa Springs State Wildlife Park. The park provides a wonderful home for some manatees. <span class="drop-zone" data-id="41">[41]</span> They are well looked after by people who really understand them. The park also serves as a research and observation center, offering three daily educational programs to the public.</p>
                    <p>From December to March, groups of manatees escape the cold winter ocean and bask in the warm waters near power plants and coastal springs that stay about 23 degrees year-round. Snorkelers, divers and swimmers come to Florida from all over the world for a chance to swim or interact with the docile manatee in its natural environment, rich in marine vegetation. <span class="drop-zone" data-id="42">[42]</span> So the manatees arrive every year by the hundreds to find warmth, nourishment and maybe, just maybe, to visit us, the curious humans.</p>
                `,
                options: [
                    { id: "A", text: "The truth is, swimming with manatees is a life-altering experience." },

                    <strong>37. F:</strong> <strong>[Chiến thuật: 2.1 Pronouns / Movement]</strong><br>

                    <p>There’s more to icebergs than meets the eye – as I discovered filming on one of these gigantic Arctic fortresses as it slowly melted.</p>
                    <p>Imagine a solid sheet of frozen water 3 km across and 100 m thick. Imagine it floating quietly in dark ocean waters, somewhere between Canada and Greenland. Imagine the near-silent desolation of the inhospitable Arctic environment around it, getting harsher as winter approaches. <span class="drop-zone" data-id="37">[37]</span> Imagine this forbidding, serene, massive place. But it really exists. This iceberg right now is floating in peace as we all go about our busy, bustling lives.</p>
                    <p>Back in the summer, things were different. This iceberg was a dynamic battleground, floodlit by 24-hour daylight. Once an iceberg is released from its parent glacier, its time is very limited. <span class="drop-zone" data-id="38">[38]</span> Then mini-bergs break off the weakened front. Some of these events we witnessed were sudden, loud and violent. We had come to spectate on this oceanic siege, and to learn its rules.</p>
                    <p>The ice edge towered over us, vertical, angular and utterly spectacular. We steamed around the berg until we found lower cliffs, and suddenly the icescape behind was revealed. Gentle mounds are separated by valleys. <span class="drop-zone" data-id="39">[39]</span> An iceberg makes its own fog, so we could only see a little way into the centre, peering hopefully over the top of the cliffs.</p>
                    <p>Curious polar bears peered back. We had thought we would be lucky to see one or two, but the iceberg turned out to have a healthy population of these huge carnivores. <span class="drop-zone" data-id="40">[40]</span> They must wait for the sea ice to come back so that they can hunt. So they were snoozing away, not at all bothered that their chosen holiday home was moving, tilting, melting, breaking up and giving a TV production team and some scientists severe logistical headaches.</p>
                    <p>That’s how I remember the iceberg, and that’s the side of it you’ll see if you watch the programmes. But since then things have changed. We left a GPS tracker as a passenger, so we know that the iceberg has travelled 60 miles, and is now about 30 miles south of where it was in August. Only 65% of it is left. The iceberg only sees 7 hours and 40 minutes of daylight now, and soon the darkness will swallow it up completely. <span class="drop-zone" data-id="41">[41]</span> Winter is beginning, and with it returns a period of stability.</p>
                    <p>Sea ice is advancing towards the berg from the north. This is the other type of ice at the poles, formed when the sea surface itself freezes. In an average year, the sea ice would already have reached our iceberg. But this year, the ice was less summer sea ice in the Arctic than any other year on record, so it is taking longer for the great freeze to reach it. The sea ice is still crawling south. <span class="drop-zone" data-id="42">[42]</span> Then the iceberg will be frozen in place. Darkness and silence will rule. The bears will be able to walk out on to the sea ice and hunt again.</p>

                    <strong>37. E:</strong> <strong>[Chiến thuật: 1.3 Setting the Scene / Sound]</strong><br>

                    <strong>41. G:</strong> <strong>[Chiến thuật: 1.2 Cause – Result]</strong><br>
                    Trước gap: "darkness will swallow it up... only sees 7 hours... daylight" (bóng tối bao trùm, chỉ có 7 tiếng ánh sáng). Câu G: "The supply of energy from the sun is so weak..." (Nguồn năng lượng mặt trời quá yếu...). Câu G là kết quả/sự diễn giải của việc thiếu ánh sáng mặt trời.<br><br>
                    
                    <strong>42. C:</strong> <strong>[Chiến thuật: 2.1 Pronouns / Sequence]</strong><br>
                    Trước gap: "The sea ice is still crawling south" (Băng biển vẫn đang bò về phía nam). Câu C: "When it touches the cliffs... it will connect our iceberg..." (Khi nó chạm vào vách đá... nó sẽ kết nối tảng băng...). "It" ám chỉ "sea ice". Câu sau "Then the iceberg will be frozen in place" là bước tiếp theo của quá trình kết nối này.
                `
            }
        ];

        // --- 1. BIẾN LƯU THỜI GIAN BẮT ĐẦU ---
        var thoiGianBatDau = new Date();

        // --- 2. HÀM GỬI KẾT QUẢ ---
        function guiKetQua10Cot(tenBai, maHS, tenHS, diemSo, phanTram, thoiGianLamBai) {
            
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQHdZDP0xL5F0rCSlQMRRnEq-xbFDFRfeWfQy95FXXFsDiJ66CyOqxrb0tLyvucEuEqw/exec"; 
            
            const statusEl = document.getElementById('sheet-status');
            if(statusEl) statusEl.textContent = "Đang gửi dữ liệu...";

            var gio = thoiGianBatDau.getHours();
            var phut = thoiGianBatDau.getMinutes();
            var giay = thoiGianBatDau.getSeconds();
            var gioBatDauString = (gio < 10 ? '0'+gio : gio) + ":" + (phut < 10 ? '0'+phut : phut) + ":" + (giay < 10 ? '0'+giay : giay);

            var duLieu = {
                tenSheet: "Book 3 Reading Part 6 - Test 1 & 2", 
                tenBai: tenBai,            
                maHocSinh: maHS,
                hoTen: tenHS,
                gioBatDau: gioBatDauString,
                thoiGianLam: thoiGianLamBai, 
                soCauDung: diemSo,         
                phanTram: phanTram         
            };

            console.log("Đang gửi...", duLieu);

            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(duLieu)
            }).then(() => {
                if(statusEl) statusEl.innerHTML = '<span class="text-green-600"><i class="fas fa-check-circle"></i> Kết quả đã được lưu thành công!</span>';
                alert("✅ Submission Successful!");
            }).catch(err => {
                console.error(err);
                if(statusEl) statusEl.innerHTML = '<span class="text-red-500">Submission failed</span>';
                alert("❌ Submission failed");
            });
        }

        // --- APP LOGIC ---
        const app = {
            state: {
                currentTestIdx: 0,
                userName: "Student",
                studentId: "",
                startTime: null,
                userAnswers: {}, 
                draggedId: null,
                attemptsLeft: 2, 
                testCompleted: false,
                testPassed: false // Thêm trạng thái Đậu/Rớt
            },

            startExam() {
                const name = document.getElementById('user-name-input').value.trim();
                const id = document.getElementById('user-id-input').value.trim();
                
                if (!name) { alert("Please enter your name!"); return; }
                
                thoiGianBatDau = new Date();
                
                this.state.userName = name;
                this.state.studentId = id;
                this.state.startTime = thoiGianBatDau; 
                
                document.getElementById('header-name').textContent = name;
                document.getElementById('screen-welcome').classList.add('hidden');
                document.getElementById('screen-app').classList.remove('hidden');
                document.getElementById('screen-app').classList.add('flex');
                
                this.startTimer();
                this.renderTest();
            },

            startTimer() {
                setInterval(() => {
                    const now = new Date();
                    const diff = now - this.state.startTime;
                    const d = new Date(diff);
                    document.getElementById('timer-display').textContent = d.toISOString().substr(11, 8);
                }, 1000);
            },

            renderTest() {
                const test = db[this.state.currentTestIdx];
                
                document.getElementById('text-title').textContent = test.title;
                document.getElementById('header-title').textContent = `Test ${this.state.currentTestIdx + 1}`;
                document.getElementById('header-progress').textContent = `${this.state.currentTestIdx + 1}/${db.length}`;
                
                // --- LOGIC HIỂN THỊ EXPLANATION ---
                const expBox = document.getElementById('explanation-box');
                const expContent = document.getElementById('explanation-content');
                
                // Chỉ hiện giải thích khi đã hoàn thành VÀ ĐÃ ĐẬU
                if (this.state.testCompleted && this.state.testPassed) {
                    expBox.classList.remove('hidden');
                    expContent.innerHTML = test.explanations;
                } else {
                    expBox.classList.add('hidden');
                    expContent.innerHTML = '';
                }
                
                document.getElementById('attempts-display').textContent = `Attempts left: ${this.state.attemptsLeft}`;

                // Render Content
                const contentDiv = document.getElementById('reading-content');
                if (contentDiv.innerHTML.trim() === "" || contentDiv.getAttribute('data-test-id') !== test.id) {
                     contentDiv.innerHTML = test.content_html;
                     contentDiv.setAttribute('data-test-id', test.id);
                }
                
                // Re-bind events and fill UI
                const gaps = contentDiv.querySelectorAll('.drop-zone');
                gaps.forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    const key = `${test.id}-${qId}`;
                    const savedAns = this.state.userAnswers[key];
                    
                    if (savedAns) {
                        this.fillGapUI(gap, savedAns);
                    } else {
                         gap.className = 'drop-zone';
                         gap.innerHTML = `[${qId}]`;
                         gap.ondragover = (e) => this.allowDrop(e);
                         gap.ondrop = (e) => this.drop(e);
                    }
                    
                    if (!this.state.testCompleted) {
                         gap.onclick = () => this.handleGapClick(test.id, qId);
                    } else {
                        gap.onclick = null;
                        gap.ondragover = null;
                        gap.ondrop = null;
                    }
                });

                this.renderOptions(test);

                const btnCheck = document.getElementById('btn-check');
                const btnNext = document.getElementById('btn-next');
                
                if (this.state.testCompleted) {
                    btnCheck.classList.add('hidden');
                    btnNext.classList.remove('hidden');
                    if (this.state.currentTestIdx === db.length - 1) {
                         btnNext.innerHTML = 'Finish Exam <i class="fas fa-flag-checkered"></i>';
                         btnNext.onclick = () => this.finishExam();
                    } else {
                         btnNext.innerHTML = 'Next Test <i class="fas fa-arrow-right"></i>';
                         btnNext.onclick = () => this.nextTest();
                    }
                } else {
                    btnCheck.classList.remove('hidden');
                    btnNext.classList.add('hidden');
                }
            },

            renderOptions(test) {
                const container = document.getElementById('options-container');
                container.innerHTML = '';

                test.options.forEach(opt => {
                    const isUsed = Object.entries(this.state.userAnswers).some(([k, v]) => k.startsWith(test.id) && v === opt.id);
                    
                    const div = document.createElement('div');
                    div.className = `draggable-item bg-white border border-slate-200 p-3 rounded-lg shadow-sm hover:shadow-md transition-all text-sm ${isUsed ? 'used' : ''}`;
                    if (!isUsed && !this.state.testCompleted) {
                        div.draggable = true;
                        div.ondragstart = (e) => this.drag(e, opt.id, opt.text);
                        div.ontouchstart = (e) => this.touchStart(e, opt.id, opt.text);
                    }
                    div.innerHTML = `<span class="font-bold text-green-600 mr-2">[${opt.id}]</span> ${opt.text}`;
                    
                    container.appendChild(div);
                });
            },

            // --- DRAG & DROP ---
            drag(ev, optId, optText) {
                this.state.draggedId = { id: optId, text: optText };
                ev.dataTransfer.setData("text", JSON.stringify({id: optId, text: optText}));
            },
            
            allowDrop(ev) { ev.preventDefault(); ev.target.classList.add('hovered'); },
            
            drop(ev) {
                ev.preventDefault();
                const target = ev.target.closest('.drop-zone');
                if (!target) return;
                
                target.classList.remove('hovered');
                target.classList.remove('wrong'); 
                
                let data = this.state.draggedId;
                if (!data && ev.dataTransfer) {
                     try { data = JSON.parse(ev.dataTransfer.getData("text")); } catch(e){}
                }
                
                if (data) {
                    const qId = target.getAttribute('data-id');
                    this.state.userAnswers[`${db[this.state.currentTestIdx].id}-${qId}`] = data.id;
                    this.renderTest();
                }
            },

            handleGapClick(testId, qId) {
                const key = `${testId}-${qId}`;
                if (this.state.userAnswers[key]) {
                    delete this.state.userAnswers[key];
                    this.renderTest();
                }
            },

            fillGapUI(gapEl, optId) {
                const test = db[this.state.currentTestIdx];
                const optText = test.options.find(o => o.id === optId)?.text || "";
                
                // Keep wrong status visible if exists
                if(!gapEl.classList.contains('wrong') && !gapEl.classList.contains('correct')){
                     gapEl.className = 'drop-zone filled';
                } else {
                     gapEl.classList.add('filled');
                }
                
                gapEl.innerHTML = `<span class="font-bold mr-2">[${optId}]</span>${optText}`;
            },

            // --- CHECK LOGIC (UPDATED) ---
            checkAnswers() {
                const test = db[this.state.currentTestIdx];
                let correctCount = 0;
                let answeredCount = 0;
                
                // Đếm số câu trả lời
                document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    if (this.state.userAnswers[`${test.id}-${qId}`]) answeredCount++;
                });

                if (answeredCount < 6) {
                    alert("Please fill all gaps before checking.");
                    return;
                }

                // Tính điểm
                document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    const userAns = this.state.userAnswers[`${test.id}-${qId}`];
                    if (userAns && userAns === test.answers[qId]) correctCount++;
                });

                // Xử lý điều kiện
                if (correctCount >= 4) {
                    // ĐẬU
                    this.showFeedback(true);
                } else {
                    // CHƯA ĐẠT
                    if (this.state.attemptsLeft > 0) {
                        this.state.attemptsLeft--;
                        alert(`Incorrect. You need at least 4 correct answers. You have ${this.state.attemptsLeft} attempt(s) left.`);
                        this.highlightErrors(); 
                        this.renderTest(); 
                    } else {
                        // HẾT LƯỢT VÀ RỚT -> showFeedback(false)
                        this.showFeedback(false);
                    }
                }
            },

            highlightErrors() {
                 const test = db[this.state.currentTestIdx];
                 document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    const userAns = this.state.userAnswers[`${test.id}-${qId}`];
                    if (userAns && userAns !== test.answers[qId]) {
                        gap.classList.add('wrong');
                    }
                 });
            },

            showFeedback(passed) {
                this.state.testCompleted = true;
                this.state.testPassed = passed; // Lưu trạng thái đậu/rớt
                
                const test = db[this.state.currentTestIdx];

                document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    const userAns = this.state.userAnswers[`${test.id}-${qId}`];
                    const correctAns = test.answers[qId];
                    
                    gap.classList.remove('wrong');
                    gap.classList.remove('filled');
                    
                    if (userAns === correctAns) {
                        // Câu đúng luôn hiện xanh
                        gap.classList.add('correct');
                        gap.innerHTML = `<span class="font-bold mr-2">[${correctAns}]</span>${test.options.find(o => o.id === correctAns).text}`;
                    } else {
                        // Câu sai: Tùy vào trạng thái Pass/Fail
                        gap.classList.add('wrong');
                        
                        // CHỈ HIỆN ĐÁP ÁN ĐÚNG NẾU ĐÃ PASS
                        if (passed) {
                            const correctOpt = test.options.find(o => o.id === correctAns);
                            gap.innerHTML += `<div class="text-xs text-green-700 mt-2 p-2 bg-green-50 rounded border border-green-200 font-normal"><i class="fas fa-check"></i> Correct: [${correctAns}] ${correctOpt.text}</div>`;
                        } else {
                            // Nếu Fail, chỉ giữ lại báo đỏ, không hiện text đáp án đúng
                        }
                    }
                });

                if (passed) {
                    alert("Great job! You passed this test (>= 4 correct).");
                } else {
                    alert("Out of attempts. You did not reach the required score (4/6). Answers will not be shown.");
                }

                this.renderTest(); // Render lại để cập nhật explanation box (ẩn/hiện)
            },

            nextTest() {
                this.state.currentTestIdx++;
                this.state.attemptsLeft = 2; 
                this.state.testCompleted = false;
                this.state.testPassed = false; // Reset trạng thái
                this.renderTest();
            },

            finishExam() {
                const endTime = new Date();
                const diffMs = endTime - this.state.startTime;
                const minutes = Math.floor(diffMs / 60000);
                const seconds = Math.floor(((diffMs % 60000) / 1000));
                const durationStr = `${minutes} min ${seconds} sec`;

                let score = 0;
                let totalQ = 0;

                db.forEach(test => {
                    for (let qId = 37; qId <= 42; qId++) {
                        totalQ++;
                        const key = `${test.id}-${qId}`;
                        const userAns = this.state.userAnswers[key] || "-";
                        const correctAns = test.answers[qId];
                        if (userAns === correctAns) {
                            score++;
                        }
                    }
                });

                const percent = Math.round((score / totalQ) * 100);

                guiKetQua10Cot(
                    "FCE Reading Part 6 - Test 1 & 2", 
                    this.state.studentId,
                    this.state.userName, 
                    score + "/" + totalQ,
                    percent + "%",
                    durationStr
                );

                document.getElementById('screen-app').classList.add('hidden');
                document.getElementById('screen-result').classList.remove('hidden');
                document.getElementById('result-score').textContent = score;
                document.getElementById('result-percent').textContent = `${percent}%`;
                document.getElementById('res-name').textContent = this.state.userName;
                document.getElementById('res-id').textContent = this.state.studentId;
                document.getElementById('res-time').textContent = durationStr;
            },

            touchStart(ev, optId, text) {
                this.state.draggedId = { id: optId, text: text };
                document.querySelectorAll('.drop-zone').forEach(el => el.style.borderColor = '#22c55e');
            }
        };
    </script>
</body>
</html>
