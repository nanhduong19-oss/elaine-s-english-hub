<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET Reading Part 4 - Drag & Drop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* --- DRAG & DROP STYLES --- */
        
        /* 1. Base Drop Zone (Empty - Rose Theme for PET) */
        .drop-zone {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: auto;
            min-width: 45px;
            height: 28px;
            margin: 0 4px;
            background-color: #fff1f2; /* Rose-50 */
            border: 2px dashed #fda4af; /* Rose-300 */
            border-radius: 6px;
            transition: all 0.2s ease;
            color: #be123c; /* Rose-700 */
            font-weight: 700;
            font-size: 0.85em;
            padding: 0 6px;
            vertical-align: middle;
            cursor: pointer;
        }

        .drop-zone.hovered {
            background-color: #fce7f3;
            border-color: #db2777;
            transform: scale(1.1);
        }

        /* 2. FILLED STATE (Bình thường: Đen, Đậm, Không nền, Không viền) */
        .drop-zone.filled {
            display: inline; 
            width: auto;
            height: auto;
            margin: 0 2px;
            padding: 2px 6px;
            
            /* Visuals: Transparent & No Border */
            background-color: transparent !important; 
            border: none !important; 
            border-radius: 4px;
            border-bottom: 2px solid transparent !important; /* Để dành cho hover */
            
            /* Typography: Black Text by default */
            color: #000000 !important; 
            font-size: 1em;
            font-weight: 800; /* In đậm */
            line-height: 1.6;
            text-align: left;
            box-shadow: none !important;
            white-space: normal;
        }
        
        /* Hover vào câu đã điền: Hiện gạch chân hồng */
        .drop-zone.filled:hover {
            border-bottom: 2px solid #be123c !important; 
            background-color: #fff1f2 !important; /* Feedback nhẹ khi hover */
        }
        
        .drop-zone.filled:hover::after {
            content: ' ✕';
            font-size: 0.8em;
            color: #ef4444;
            margin-left: 5px;
        }

        /* 3. CORRECT STATE (Đúng: Chữ Xanh đậm, Nền Xanh nhạt, Tích) */
        .drop-zone.filled.correct {
            background-color: #dcfce7 !important; /* Light Green Bg */
            color: #15803d !important; /* Dark Green Text */
            border: 1px solid #86efac !important;
            border-bottom: 1px solid #86efac !important;
            padding-right: 28px !important; /* Chừa chỗ cho icon */
            position: relative;
            pointer-events: none; /* Khóa */
        }

        .drop-zone.filled.correct::after {
            content: '\f00c'; /* FontAwesome Check Icon */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8em;
            color: #15803d;
            margin-left: 0;
        }

        /* 4. WRONG STATE (Sai: Chữ Đỏ đậm, Nền Đỏ nhạt, X) */
        .drop-zone.filled.wrong {
            background-color: #fee2e2 !important; /* Light Red Bg */
            color: #b91c1c !important; /* Dark Red Text */
            border: 1px solid #fca5a5 !important;
            border-bottom: 1px solid #fca5a5 !important;
            padding-right: 28px !important; /* Chừa chỗ cho icon */
            position: relative;
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        .drop-zone.filled.wrong::after {
            content: '\f00d'; /* FontAwesome X Icon */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8em;
            color: #b91c1c;
            margin-left: 0;
        }

        .draggable-item { cursor: grab; user-select: none; touch-action: none; }
        .draggable-item:active { cursor: grabbing; }
        .draggable-item.dragging { opacity: 0.5; transform: scale(0.95); }
        .draggable-item.used {
            opacity: 0.4;
            pointer-events: none;
            background-color: #f1f5f9;
            filter: grayscale(100%);
            border-style: dashed;
            color: #94a3b8;
        }

        .reading-content p { margin-bottom: 1.5em; line-height: 2.2; text-align: justify; }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        #questions-container { overflow-anchor: none !important; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col text-slate-800 overflow-hidden">

    <!-- SCREEN 1: WELCOME -->
    <div id="screen-welcome" class="fixed inset-0 z-50 bg-slate-50 flex items-center justify-center p-4">
        <div class="bg-white max-w-md w-full rounded-2xl shadow-xl border border-slate-100 overflow-hidden">

            <div class="p-8 text-center">

                <div class="inline-block bg-rose-100 text-rose-700 px-4 py-1 rounded-full text-xs font-bold tracking-wider mb-8">
                    DRAG & DROP MODE
                </div>

                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Student Code</label>

    </div>

    <!-- SCREEN 2: MAIN APP -->
    <div id="screen-app" class="hidden flex-col h-full">
        <!-- Header -->
        <header class="bg-white border-b border-slate-200 h-16 flex-none z-20">
            <div class="h-full max-w-[1920px] mx-auto px-6 flex justify-between items-center">
                <div class="flex items-center gap-4">

                    </div>
                    <h2 id="header-title" class="font-bold text-slate-800 text-lg truncate">Test 1</h2>
                </div>
                <div class="flex items-center gap-4">
                     <div class="text-right hidden md:block">

                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-grow flex overflow-hidden bg-slate-100 relative">
            <div class="w-full h-full flex flex-col lg:flex-row">
                <!-- Text Area -->
                <div class="w-full lg:w-[65%] h-1/2 lg:h-full bg-white border-r border-slate-200 overflow-y-auto custom-scrollbar p-6 lg:p-10 relative">
                    <div class="max-w-4xl mx-auto pb-20">
                        <h3 class="font-bold text-slate-400 text-xs uppercase tracking-wider mb-2">Reading Article</h3>
                        <h2 id="text-title" class="text-2xl font-extrabold text-slate-800 mb-6">Article Title</h2>
                        <div id="reading-content" class="reading-content text-lg text-slate-700 font-normal leading-loose"></div>
                        
                        <div id="explanation-box" class="hidden mt-8 p-6 bg-rose-50 rounded-xl border border-rose-200">
                            <h4 class="font-bold text-rose-800 mb-4 flex items-center gap-2"><i class="fas fa-lightbulb"></i> Explanations</h4>
                            <div id="explanation-content" class="space-y-3 text-sm text-rose-900"></div>
                        </div>
                    </div>
                </div>

                <!-- Options Area -->
                <div class="w-full lg:w-[35%] h-1/2 lg:h-full bg-slate-50 flex flex-col border-t lg:border-t-0 border-slate-200 shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)] z-10">
                    <div class="p-4 bg-white border-b border-slate-200 shadow-sm flex-none flex justify-between items-center">
                        <h3 class="font-bold text-rose-700 flex items-center gap-2 text-sm uppercase tracking-wider">
                            <i class="fas fa-list-ul"></i> Sentences A-H
                        </h3>
                        <div id="attempts-display" class="text-xs font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded">

                        </div>
                    </div>
                    <div id="options-container" class="flex-grow overflow-y-auto custom-scrollbar p-4 space-y-3 pb-20"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- SCREEN 3: RESULT -->
    <div id="screen-result" class="hidden fixed inset-0 z-50 bg-slate-50 overflow-y-auto custom-scrollbar">
        <div class="min-h-screen w-full flex items-start justify-center p-6 md:py-12">
            <div class="max-w-2xl w-full flex flex-col gap-6">

                </div>

                    </div>
                    <div id="result-percent" class="text-slate-500 font-medium mb-6">0%</div>
                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-100 flex justify-between text-sm font-bold text-slate-600">
                         <span>Candidate: <span id="res-name"></span> (<span id="res-id"></span>)</span>
                         <span>Time: <span id="res-time"></span></span>
                    </div>
                    <div id="sheet-status" class="mt-4 text-sm font-medium text-slate-400">Waiting to send...</div>
                </div>
                <button onclick="location.reload()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl">Practice Again</button>
            </div>
        </div>
    </div>

    <script>
        // --- PET DATA (Test 1, 2, 3) ---
        const db = [
            {
                id: "test1",
                title: "An Amazing Journey",
                content_html: `
                    <p>I was walking my dog near my home in San Francisco last spring when I saw a large black Labrador on its own. It was wearing a blue collar, but there was no sign of an owner anywhere. <span class="drop-zone" data-id="16">[16]</span> I was only joking, but it came running to me and stood by my side, ready to leave. I knew this was someone’s lost pet.</p>
                    <p>I fed and bathed the dog and checked its collar. There was a tag on it with a phone number. It turned out that the dog’s name was Banjo, and sure enough, he had an owner and a home. The trouble was that his home was in Chicago – over 2,000 miles away! <span class="drop-zone" data-id="17">[17]</span> Banjo had been missing for over a year, and they had no idea how he had got all the way across the country. They also had no idea how to get him back again because they had a newborn baby at home and couldn’t make the long journey to San Francisco.</p>
                    <p>I used social media to ask for help. It wasn’t long before we had a long list of volunteers who wanted to help Banjo to get home. <span class="drop-zone" data-id="18">[18]</span> It was important that they knew how to take care of Banjo. Banjo set off on his journey, and met new people in California, Arizona, New Mexico, Texas, Oklahoma, Arkansas and Missouri before he reached his home state of Illinois.</p>
                    <p><span class="drop-zone" data-id="19">[19]</span> Banjo was delighted to meet the new baby and to be back home. His owners were thrilled to have him back. <span class="drop-zone" data-id="20">[20]</span> Banjo’s story just goes to show what people can achieve when they all work together!</p>
                `,
                options: [
                    { id: "A", text: "I made sure that all of them were pet owners." },
                    { id: "B", text: "I decided to travel to Chicago with Banjo." },
                    { id: "C", text: "It took 20 drivers four days to reunite Banjo with his family." },
                    { id: "D", text: "I asked the dog if it wanted to come home with me." },
                    { id: "E", text: "I hope he won’t go wandering again." },
                    { id: "F", text: "His owners, Tina and Dan, were amazed to hear from me." },
                    { id: "G", text: "It was clearly hungry, and needed to rest." },
                    { id: "H", text: "I didn’t know who the dog belonged to." }
                ],
                answers: { 16: "D", 17: "F", 18: "A", 19: "C", 20: "E" },
                explanations: `
                    <strong>16. D:</strong> <strong>[Action - Reaction / Contrast]</strong><br>Trước gap: "no sign of an owner anywhere" (không có dấu hiệu chủ nhân). Sau gap: "I was only joking" (Tôi chỉ đùa thôi). Câu D "I asked the dog if it wanted to come home with me" (Tôi hỏi chú chó muốn về nhà với tôi không) là hành động dẫn đến phản ứng "tôi chỉ đùa" ở câu sau.
                    <br><br>
                    <strong>17. F:</strong> <strong>[Reference / Contextual Logic]</strong><br>Trước gap: Nhà chú chó ở tận Chicago, cách 2000 dặm. Câu F "His owners... were amazed to hear from me" (Chủ nó... rất ngạc nhiên khi nghe tin từ tôi) rất hợp lý vì họ đang ở xa và không nghĩ chó mình lại ở đó. "They" ở câu sau gap ám chỉ "His owners".
                    <br><br>
                    <strong>18. A:</strong> <strong>[Reference / Linking Idea]</strong><br>Trước gap: nhắc đến danh sách "volunteers" (tình nguyện viên). Câu A "I made sure that all of them were pet owners" (Tôi đảm bảo tất cả họ đều nuôi thú cưng). "All of them" thay thế cho "volunteers". Điều này liên kết logic với câu sau: "Important that they knew how to take care of Banjo" (Quan trọng là họ biết cách chăm sóc Banjo).
                    <br><br>
                    <strong>19. C:</strong> <strong>[Summary / Consequence]</strong><br>Đoạn trước kể về hành trình qua nhiều bang. Câu C "It took 20 drivers four days..." (Mất 20 tài xế và 4 ngày...) tóm tắt lại kết quả của nỗ lực đưa Banjo về nhà.
                    <br><br>
                    <strong>20. E:</strong> <strong>[Concluding Thought]</strong><br>Đoạn kết nói về sự đoàn tụ vui vẻ. Câu E "I hope he won’t go wandering again" (Tôi mong nó không đi lang thang nữa) là lời kết khép lại câu chuyện về chú chó đi lạc.
                `
            },
            {
                id: "test2",
                title: "A Helping Hand",
                content_html: `
                    <p>Lee Newton was sitting on a station platform under an old blanket when he saw a young couple talking. <span class="drop-zone" data-id="16">[16]</span> It was a freezing night in January, and the couple were clearly cold. Lee called to them and asked them if they wanted to share his blanket. The three of them started chatting, and Lee learned that their names were Karen and Mark.</p>
                    <p><span class="drop-zone" data-id="17">[17]</span> Lee told them that he’d lost his job and then his flat when he could no longer pay the rent. He had no family to help him, and nowhere to go. <span class="drop-zone" data-id="18">[18]</span> Karen and Mark felt terrible. They couldn’t imagine sleeping on the icy platform for even one night. As they spent their night in the station chatting to Lee, they realized that anyone could end up in his situation. <span class="drop-zone" data-id="19">[19]</span></p>
                    <p>When morning came, Karen and Mark bought an extra train ticket and invited Lee to come home with them. Lee accepted, and gratefully moved into Karen and Mark’s spare bedroom. Once he had an address, Lee was able to apply for jobs. <span class="drop-zone" data-id="20">[20]</span> He saved up to buy a small motorbike, then got an evening job delivering pizzas. After a few months, Lee had saved up enough money to rent a small flat of his own.</p>
                    <p>‘When times get tough, you need friends and family,’ Lee says. ‘Karen and Mark became that for me. An act of kindness was all Lee needed to help him get his life back.’</p>
                `,
                options: [
                    { id: "A", text: "He offered to drive them home." },
                    { id: "B", text: "He’d been sleeping in the train station for three months." },
                    { id: "C", text: "They’d missed the last train, and they seemed upset." },
                    { id: "D", text: "They enjoyed living together, so Lee decided to stay." },
                    { id: "E", text: "He soon found work in a local factory." },
                    { id: "F", text: "They felt very lucky to have jobs and a home." },
                    { id: "G", text: "It wasn’t a big problem because he bought a flat." },
                    { id: "H", text: "Karen explained that they lived two hours away and they couldn’t afford a taxi home." }
                ],
                answers: { 16: "C", 17: "H", 18: "B", 19: "F", 20: "E" },
                explanations: `
                    <strong>16. C:</strong> <strong>[Reason / Context]</strong><br>Trước gap: Lee thấy cặp đôi đang nói chuyện. Sau gap: trời lạnh và họ rõ ràng đang lạnh. Câu C "They’d missed the last train..." (Họ lỡ chuyến tàu cuối...) giải thích lý do tại sao họ lại ở nhà ga vào đêm lạnh và tại sao họ có vẻ buồn bã ("upset").
                    <br><br>
                    <strong>17. H:</strong> <strong>[Dialogue Flow / Problem Statement]</strong><br>Trước gap: Họ bắt đầu trò chuyện và giới thiệu tên. Sau gap: Lee kể chuyện mình. Câu H "Karen explained that they lived two hours away..." (Karen giải thích nhà xa và không đủ tiền taxi...) là phần Karen chia sẻ hoàn cảnh của họ trước, tạo đà cho cuộc hội thoại.
                    <br><br>
                    <strong>18. B:</strong> <strong>[Elaboration / Cause-Effect]</strong><br>Trước gap: Lee kể mình mất việc, mất nhà, không nơi nương tựa. Câu B "He’d been sleeping in the train station for three months" (Anh ấy đã ngủ ở ga tàu 3 tháng) bổ sung chi tiết về sự khổ cực. Điều này dẫn đến kết quả ở câu sau: "Karen and Mark felt terrible" (Karen và Mark cảm thấy tồi tệ thay cho anh).
                    <br><br>
                    <strong>19. F:</strong> <strong>[Contrast / Reflection]</strong><br>Trước gap: Cặp đôi nhận ra ai cũng có thể rơi vào hoàn cảnh của Lee. Câu F "They felt very lucky to have jobs and a home" (Họ thấy may mắn khi có việc làm và nhà) thể hiện sự so sánh và trân trọng cuộc sống hiện tại của họ so với hoàn cảnh của Lee.
                    <br><br>
                    <strong>20. E:</strong> <strong>[Sequence / Result]</strong><br>Trước gap: Lee có địa chỉ để xin việc ("apply for jobs"). Câu E "He soon found work in a local factory" (Anh ấy sớm tìm được việc ở nhà máy) là kết quả trực tiếp của việc xin việc. Việc này giúp anh có tiền để "saved up to buy a small motorbike" ở câu sau.
                `
            },
            {
                id: "test3",
                title: "Lost Luggage",
                content_html: `
                    <p>Two years ago, I went on holiday to Rome with my family. It was a four-hour train journey from our home, and we all helped to plan the trip. We were looking forward to seeing the famous sights. Everything went really well and we had a great time visiting the amazing tourist attractions. I was in charge of taking all the photos with my brand new phone, which had an excellent camera. We stayed in Rome for two weeks, and it was really incredible.</p>
                    <p>On the train journey back home, I decided to open my backpack, but I couldn’t find it. <span class="drop-zone" data-id="16">[16]</span> I was very upset because I’d packed my phone in that backpack, along with my travel journal. <span class="drop-zone" data-id="17">[17]</span> Weeks passed, and then months. At first, I contacted the train company every week, but after some time, it was clear that my backpack was never going to be found. After a while, I forgot all about it.</p>
                    <p>Last month, I took the train to Florence on a school trip. Incredibly, my backpack went missing again! <span class="drop-zone" data-id="18">[18]</span> After Rome, I always kept my phone and other important items in my pockets.</p>
                    <p>Two weeks after the Florence trip, I received a phone call from the train company. They told me they had my backpack, and they would send it to my local station. I assumed it was my backpack from the school trip. <span class="drop-zone" data-id="19">[19]</span> Someone from the train company had found the backpack from Rome in a dusty old storeroom! Everything inside it was safe, and I finally got to share the photos with my family. <span class="drop-zone" data-id="20">[20]</span> I decided we should all go back to Rome for another holiday … but this time, I would be much more careful with my things!</p>
                `,
                options: [
                    { id: "A", text: "I never travelled with the same train company again." },
                    { id: "B", text: "When I arrived at the station, I couldn’t believe my eyes!" },
                    { id: "C", text: "All my memories of Rome were in that backpack." },
                    { id: "D", text: "I couldn’t leave the station without my bag." },
                    { id: "E", text: "It was so wonderful to see them." },
                    { id: "F", text: "I knew I would never see my new phone again." },
                    { id: "G", text: "I searched and searched, but it was nowhere to be seen!" },
                    { id: "H", text: "But, this time, there were no precious memories inside." }
                ],
                answers: { 16: "G", 17: "C", 18: "H", 19: "B", 20: "E" },
                explanations: `
                    <strong>16. G:</strong> <strong>[Action / Result]</strong><br>Trước gap: "I couldn’t find it" (Tôi không tìm thấy nó). Câu G "I searched and searched, but it was nowhere to be seen!" (Tôi tìm mãi nhưng không thấy đâu) mô tả hành động tìm kiếm tuyệt vọng và khẳng định việc mất đồ.
                    <br><br>
                    <strong>17. C:</strong> <strong>[Reference / Emotive Link]</strong><br>Trước gap: nhắc đến điện thoại (có ảnh) và nhật ký du lịch. Câu C "All my memories of Rome were in that backpack" (Mọi ký ức về Rome đều trong đó) tóm lại giá trị của những món đồ đó là "memories" (ký ức).
                    <br><br>
                    <strong>18. H:</strong> <strong>[Contrast]</strong><br>Trước gap: Balo lại mất lần nữa ("went missing again"). Câu H "But, this time, there were no precious memories inside" (Nhưng lần này không có ký ức quý giá nào bên trong) tạo sự tương phản với lần mất trước. Câu sau giải thích lý do: tác giả đã để đồ quan trọng trong túi quần ("kept... in my pockets").
                    <br><br>
                    <strong>19. B:</strong> <strong>[Reaction / Surprise]</strong><br>Trước gap: Tác giả tưởng là balo chuyến đi Florence. Câu B "When I arrived at the station, I couldn’t believe my eyes!" (Khi đến ga, tôi không tin vào mắt mình) diễn tả sự ngạc nhiên tột độ khi phát hiện sự thật ở câu sau: đó là balo từ chuyến đi Rome!
                    <br><br>
                    <strong>20. E:</strong> <strong>[Reference]</strong><br>Trước gap: "share the photos with my family" (chia sẻ ảnh với gia đình). Câu E "It was so wonderful to see them" (Thật tuyệt vời khi được nhìn thấy chúng). "Them" ở đây thay thế cho "the photos" (những bức ảnh) vừa tìm lại được.
                `
            }
        ];

        var thoiGianBatDau = new Date();

        function guiKetQua10Cot(tenBai, maHS, tenHS, diemSo, phanTram, thoiGianLamBai) {
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzKnfEohBoagjHJmRPSM4uhSoEKeykBkzS-6DTy476UyddLxc-b8zptoQU6v8C94Nw14A/exec"; 
            const statusEl = document.getElementById('sheet-status');
            if(statusEl) statusEl.textContent = "Đang gửi dữ liệu...";

            var gio = thoiGianBatDau.getHours();
            var phut = thoiGianBatDau.getMinutes();
            var giay = thoiGianBatDau.getSeconds();
            var gioBatDauString = (gio < 10 ? '0'+gio : gio) + ":" + (phut < 10 ? '0'+phut : phut) + ":" + (giay < 10 ? '0'+giay : giay);

            var duLieu = {
                tenSheet: "PET Reading Part 4 - Test 1-3", 
                tenBai: tenBai,            
                maHocSinh: maHS,
                hoTen: tenHS,
                gioBatDau: gioBatDauString,
                thoiGianLam: thoiGianLamBai, 
                soCauDung: diemSo,         
                phanTram: phanTram         
            };

            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(duLieu)
            }).then(() => {
                if(statusEl) statusEl.innerHTML = '<span class="text-green-600"><i class="fas fa-check-circle"></i> Kết quả đã được lưu thành công!</span>';
                alert("✅ Submission Successful!");
            }).catch(err => {
                if(statusEl) statusEl.innerHTML = '<span class="text-red-500">Submission failed</span>';
            });
        }

        const app = {
            state: {
                currentTestIdx: 0,
                userName: "Student",
                studentId: "",
                startTime: null,
                userAnswers: {}, 
                draggedId: null,
                attemptsLeft: 2, 
                testCompleted: false,
                testPassed: false 
            },

            startExam() {
                const name = document.getElementById('user-name-input').value.trim();
                const id = document.getElementById('user-id-input').value.trim();
                
                if (!name) { alert("Please enter your name!"); return; }
                
                thoiGianBatDau = new Date();
                this.state.userName = name;
                this.state.studentId = id;
                this.state.startTime = thoiGianBatDau; 
                
                document.getElementById('header-name').textContent = name;
                document.getElementById('screen-welcome').classList.add('hidden');
                document.getElementById('screen-app').classList.remove('hidden');
                document.getElementById('screen-app').classList.add('flex');
                
                this.startTimer();
                this.renderTest();
            },

            startTimer() {
                setInterval(() => {
                    const now = new Date();
                    const diff = now - this.state.startTime;
                    const d = new Date(diff);
                    document.getElementById('timer-display').textContent = d.toISOString().substr(11, 8);
                }, 1000);
            },

            renderTest() {
                const test = db[this.state.currentTestIdx];
                
                document.getElementById('text-title').textContent = test.title;
                document.getElementById('header-title').textContent = `Test ${this.state.currentTestIdx + 1}`;
                document.getElementById('header-progress').textContent = `${this.state.currentTestIdx + 1}/${db.length}`;
                
                const expBox = document.getElementById('explanation-box');
                const expContent = document.getElementById('explanation-content');
                
                // Only show explanation if PASSED
                if (this.state.testCompleted && this.state.testPassed) {
                    expBox.classList.remove('hidden');
                    expContent.innerHTML = test.explanations;
                } else {
                    expBox.classList.add('hidden');
                    expContent.innerHTML = '';
                }
                
                document.getElementById('attempts-display').textContent = `Attempts left: ${this.state.attemptsLeft}`;

                const contentDiv = document.getElementById('reading-content');
                if (contentDiv.getAttribute('data-test-id') !== test.id) {
                     contentDiv.innerHTML = test.content_html;
                     contentDiv.setAttribute('data-test-id', test.id);
                     
                     const gaps = contentDiv.querySelectorAll('.drop-zone');
                     gaps.forEach(gap => {
                        const qId = gap.getAttribute('data-id');
                        const key = `${test.id}-${qId}`;
                        const savedAns = this.state.userAnswers[key];
                        
                        if (savedAns) {
                            this.fillGapUI(gap, savedAns);
                        } else {
                             gap.className = 'drop-zone';
                             gap.innerHTML = `[${qId}]`;
                             gap.ondragover = (e) => this.allowDrop(e);
                             gap.ondrop = (e) => this.drop(e);
                        }
                        
                        gap.onclick = () => {
                             if (!this.state.testCompleted) this.handleGapClick(test.id, qId);
                        };
                    });
                } else {
                     const gaps = contentDiv.querySelectorAll('.drop-zone');
                     gaps.forEach(gap => {
                        const qId = gap.getAttribute('data-id');
                        const key = `${test.id}-${qId}`;
                        const savedAns = this.state.userAnswers[key];

                        if (this.state.testCompleted) {
                            gap.onclick = null;
                            gap.ondragover = null;
                            gap.ondrop = null;
                        }

                        if (savedAns) {
                             if (!gap.innerHTML.includes(savedAns)) {
                                 this.fillGapUI(gap, savedAns);
                             }
                        } else {
                             if (gap.classList.contains('filled')) {
                                 gap.className = 'drop-zone';
                                 gap.innerHTML = `[${qId}]`;
                             }
                        }
                     });
                }

                this.renderOptions(test);

                const btnCheck = document.getElementById('btn-check');
                const btnNext = document.getElementById('btn-next');
                
                if (this.state.testCompleted) {
                    btnCheck.classList.add('hidden');
                    btnNext.classList.remove('hidden');
                    if (this.state.currentTestIdx === db.length - 1) {
                         btnNext.innerHTML = 'Finish Exam <i class="fas fa-flag-checkered"></i>';
                         btnNext.onclick = () => this.finishExam();
                    } else {
                         btnNext.innerHTML = 'Next Test <i class="fas fa-arrow-right"></i>';
                         btnNext.onclick = () => this.nextTest();
                    }
                } else {
                    btnCheck.classList.remove('hidden');
                    btnNext.classList.add('hidden');
                }
            },

            renderOptions(test) {
                const container = document.getElementById('options-container');
                container.innerHTML = '';

                test.options.forEach(opt => {
                    const isUsed = Object.entries(this.state.userAnswers).some(([k, v]) => k.startsWith(test.id) && v === opt.id);
                    
                    const div = document.createElement('div');
                    div.className = `draggable-item bg-white border border-slate-200 p-3 rounded-lg shadow-sm hover:shadow-md transition-all text-sm ${isUsed ? 'used' : ''}`;
                    if (!isUsed && !this.state.testCompleted) {
                        div.draggable = true;
                        div.ondragstart = (e) => this.drag(e, opt.id, opt.text);
                        div.ontouchstart = (e) => this.touchStart(e, opt.id, opt.text);
                    }
                    div.innerHTML = `<span class="font-bold text-rose-600 mr-2">[${opt.id}]</span> ${opt.text}`;
                    container.appendChild(div);
                });
            },

            drag(ev, optId, optText) {
                this.state.draggedId = { id: optId, text: optText };
                ev.dataTransfer.setData("text", JSON.stringify({id: optId, text: optText}));
            },
            
            allowDrop(ev) { ev.preventDefault(); ev.target.classList.add('hovered'); },
            
            drop(ev) {
                ev.preventDefault();
                const target = ev.target.closest('.drop-zone');
                if (!target) return;
                target.classList.remove('hovered');
                
                let data = this.state.draggedId;
                if (!data && ev.dataTransfer) {
                     try { data = JSON.parse(ev.dataTransfer.getData("text")); } catch(e){}
                }
                
                if (data) {
                    const qId = target.getAttribute('data-id');
                    this.state.userAnswers[`${db[this.state.currentTestIdx].id}-${qId}`] = data.id;
                    this.renderTest();
                }
            },

            handleGapClick(testId, qId) {
                const key = `${testId}-${qId}`;
                if (this.state.userAnswers[key]) {
                    delete this.state.userAnswers[key];
                    this.renderTest();
                }
            },

            fillGapUI(gapEl, optId) {
                const test = db[this.state.currentTestIdx];
                const optText = test.options.find(o => o.id === optId)?.text || "";
                
                gapEl.className = 'drop-zone filled'; 
                gapEl.innerHTML = `<span class="uppercase text-rose-800 mr-1">[${optId}]</span><span class="font-extrabold">${optText}</span>`;
            },

            checkAnswers() {
                const test = db[this.state.currentTestIdx];
                let correctCount = 0;
                let answeredCount = 0;
                const totalQuestions = Object.keys(test.answers).length; 

                document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    if (this.state.userAnswers[`${test.id}-${qId}`]) answeredCount++;
                });

                if (answeredCount < totalQuestions) {
                    alert("Please fill all gaps before checking.");
                    return;
                }

                document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    const userAns = this.state.userAnswers[`${test.id}-${qId}`];
                    if (userAns && userAns === test.answers[qId]) correctCount++;
                });

                // PASS Logic: >= 4 (cho PET)
                if (correctCount >= 4) {
                    this.showFeedback(true); // PASSED
                } else {
                    if (this.state.attemptsLeft > 0) {
                        this.state.attemptsLeft--;
                        alert(`Incorrect. You need at least 4 correct answers. You have ${this.state.attemptsLeft} attempt(s) left.`);
                        this.highlightErrorsOnly(); 
                    } else {
                        this.showFeedback(false); // FAILED
                    }
                }
            },

            highlightErrorsOnly() {
                 const test = db[this.state.currentTestIdx];
                 document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    const userAns = this.state.userAnswers[`${test.id}-${qId}`];
                    
                    gap.className = 'drop-zone filled'; // Reset
                    
                    if (userAns && userAns !== test.answers[qId]) {
                        gap.classList.add('wrong'); // Add Red style
                    }
                 });
            },

            showFeedback(passed) {
                this.state.testCompleted = true;
                this.state.testPassed = passed;
                
                const test = db[this.state.currentTestIdx];

                document.querySelectorAll('.drop-zone').forEach(gap => {
                    const qId = gap.getAttribute('data-id');
                    const userAns = this.state.userAnswers[`${test.id}-${qId}`];
                    const correctAns = test.answers[qId];
                    
                    gap.className = 'drop-zone filled'; // Reset

                    if (passed) {
                        if (userAns === correctAns) {
                            gap.classList.add('correct'); // Green style
                        } else {
                            gap.classList.add('wrong'); // Red style
                        }
                    } else {
                        // FAILED
                        if (userAns !== correctAns) {
                            gap.classList.add('wrong');
                        }
                    }
                });

                if (passed) {
                    alert("Great job! You passed this test (>= 4 correct).");
                } else {
                    alert("Out of attempts. Moving to next part.");
                }

                this.renderTest(); 
            },

            nextTest() {
                this.state.currentTestIdx++;
                this.state.attemptsLeft = 2; 
                this.state.testCompleted = false;
                this.state.testPassed = false;
                this.renderTest();
            },

            finishExam() {
                const endTime = new Date();
                const diffMs = endTime - this.state.startTime;
                const minutes = Math.floor(diffMs / 60000);
                const seconds = Math.floor(((diffMs % 60000) / 1000));
                const durationStr = `${minutes} min ${seconds} sec`;

                let score = 0;
                let totalQ = 0;

                db.forEach(test => {
                    const qIds = Object.keys(test.answers);
                    totalQ += qIds.length;
                    
                    qIds.forEach(qId => {
                        const key = `${test.id}-${qId}`;
                        const userAns = this.state.userAnswers[key];
                        if (userAns === test.answers[qId]) score++;
                    });
                });

                const percent = totalQ > 0 ? Math.round((score / totalQ) * 100) : 0;

                guiKetQua10Cot(
                    "PET Reading Part 4 - Test 1-3", 
                    this.state.studentId,
                    this.state.userName, 
                    score + "/" + totalQ,
                    percent + "%",
                    durationStr
                );

                document.getElementById('screen-app').classList.add('hidden');
                document.getElementById('screen-result').classList.remove('hidden');
                document.getElementById('result-score').textContent = score;
                document.getElementById('result-score').nextElementSibling.textContent = "/" + totalQ;
                document.getElementById('result-percent').textContent = `${percent}%`;
                document.getElementById('res-name').textContent = this.state.userName;
                document.getElementById('res-id').textContent = this.state.studentId;
                document.getElementById('res-time').textContent = durationStr;
            },

            touchStart(ev, optId, text) {
                this.state.draggedId = { id: optId, text: text };
                document.querySelectorAll('.drop-zone').forEach(el => el.style.borderColor = '#e11d48');
            }
        };
    </script>
</body>
</html>
